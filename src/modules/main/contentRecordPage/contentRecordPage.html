<template>
    <article class="slds-card content-record-page-card">
        <div class="content-record-page-inner">
            <div class="content-record-hero">
            <!-- Figma: Regulated Content record header (457:75280) — single surface-2 block -->
            <div class="content-record-page-header-shell">
                <div class="content-record-page-header">
                    <div class="content-record-page-header-main">
                        <div class="content-record-page-header-icon" aria-hidden="true">
                            <lightning-icon
                                class="content-record-header-doc-icon"
                                icon-name="standard:document"
                                size="medium"
                                alternative-text="Regulated Content">
                            </lightning-icon>
                        </div>
                        <div class="content-record-page-header-titles">
                            <template lwc:if={hasRecordBreadcrumbs}>
                                <div class="content-record-breadcrumbs-wrap">
                                    <lightning-breadcrumbs class="content-record-breadcrumbs">
                                        <template for:each={recordBreadcrumbsList} for:item="crumb">
                                            <lightning-breadcrumb
                                                key={crumb.id}
                                                label={crumb.name}
                                                name={crumb.id}
                                                onclick={handleRecordBreadcrumbClick}>
                                            </lightning-breadcrumb>
                                        </template>
                                    </lightning-breadcrumbs>
                                </div>
                            </template>
                            <p class="content-record-eyebrow">{recordEyebrowLabel}</p>
                            <h1 class="content-record-page-title">{recordTitle}</h1>
                        </div>
                    </div>
                    <div class="content-record-page-header-actions" role="group" aria-label="Record actions">
                        <template lwc:if={showBackToCollection}>
                            <lightning-button
                                label="Back to collection"
                                variant="neutral"
                                icon-name="utility:chevronleft"
                                title="Open this collection in the workspace"
                                onclick={handleBackToCollectionClick}>
                            </lightning-button>
                        </template>
                        <lightning-button label="Follow" variant="brand-outline">
                        </lightning-button>
                        <lightning-button-group>
                            <lightning-button label="Edit" variant="neutral" onclick={handleEdit}></lightning-button>
                            <lightning-button label="Delete" variant="neutral"></lightning-button>
                            <lightning-button label="Clone" variant="neutral"></lightning-button>
                        </lightning-button-group>
                        <lightning-button-icon
                            icon-name="utility:down"
                            variant="border-filled"
                            alternative-text="More actions">
                        </lightning-button-icon>
                    </div>
                </div>
                <div class="content-record-highlight-panel" role="group" aria-label="Key fields">
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Content Type</span>
                        <span class="content-record-highlight-value">{contentTypeDisplay}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Version</span>
                        <span class="content-record-highlight-value">{contentVersion}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Status</span>
                        <span class="content-record-highlight-value" title={contentStatus}>{contentStatus}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Effective Dates</span>
                        <span class="content-record-highlight-value">{effectiveDates}</span>
                    </div>
                </div>
            </div>

            <!-- Figma 457:75281 — chevron segments + white stroke + inverse active fill -->
            <div class="content-record-path-actions">
                <div class="content-record-path-figma">
                    <div class="content-record-path-rail" role="group" aria-label="Content workflow stages">
                        <div class="content-record-path-stages" role="presentation">
                            <template for:each={pathStepItems} for:item="st">
                                <div key={st.key} class="content-path-seg-wrap" data-step={st.key} style={st.wrapStyle}>
                                    <div class={st.segClass} role="presentation">
                                        <div class="content-path-seg__stage">
                                            <span class="content-path-seg-label" aria-current={st.ariaCurrent}>{st.label}</span>
                                        </div>
                                        <template lwc:if={st.showRightCap}>
                                            <div class="content-path-seg__end content-path-seg__end_right" aria-hidden="true"></div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <lightning-button
                        label="Extract &amp; Match Claims"
                        variant="brand-outline"
                        icon-name="utility:sparkles"
                        class="content-record-extract-btn">
                    </lightning-button>
                    <div class="content-record-send-split slds-button-group" role="group" aria-label="Send for review">
                        <lightning-button
                            label="Send for review"
                            variant="neutral"
                            class="content-record-btn-send-review">
                        </lightning-button>
                        <lightning-button-icon
                            icon-name="utility:down"
                            variant="border-filled"
                            class="content-record-btn-send-review-chevron"
                            alternative-text="More send options">
                        </lightning-button-icon>
                    </div>
                </div>
            </div>
            </div>

            <div class="content-record-article">
            <!-- Main tabs + body (Figma: Regulated Content record tabs + two-column viewer) -->
            <lightning-tabset active-tab-value={activeTab} class="content-record-main-tabset">
                <lightning-tab label="Document" value="document" onactive={handleMainTabActive}>
                    <div class="content-record-tab-panel content-record-tab-panel_document">
                        <div class="content-record-doc-layout">
                            <div class="content-record-doc-main">
                                <div class="content-record-viewer-toolbar">
                                    <div class="content-record-viewer-toolbar-row">
                                        <div class="content-record-file-title">
                                            <lightning-icon
                                                icon-name={contentIcon}
                                                size="x-small"
                                                alternative-text="File type">
                                            </lightning-icon>
                                            <span class="content-record-file-name">{displayFileName}</span>
                                        </div>
                                        <div class="content-record-viewer-toolbar-actions">
                                            <lightning-button
                                                label="Download"
                                                variant="neutral"
                                                icon-name="utility:download">
                                            </lightning-button>
                                            <lightning-button-icon
                                                icon-name="utility:threedots"
                                                variant="border-filled"
                                                alternative-text="More file options">
                                            </lightning-button-icon>
                                        </div>
                                    </div>
                                    <div
                                        lwc:if={showLwcDocumentToolbarPagingRow}
                                        class="content-record-viewer-toolbar-row content-record-viewer-toolbar-row_paging">
                                        <div class="content-record-paging">
                                            <lightning-button-icon
                                                icon-name="utility:chevronleft"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="First page">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:chevronleft"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Previous page">
                                            </lightning-button-icon>
                                            <span class="content-record-page-indicator">{currentPage} of {totalPages}</span>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Next page">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Last page">
                                            </lightning-button-icon>
                                        </div>
                                        <div class="content-record-viewer-tools">
                                            <lightning-button-icon
                                                icon-name="utility:search"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Search in document">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:zoomin"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Zoom in">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:zoomout"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Zoom out">
                                            </lightning-button-icon>
                                            <lightning-combobox
                                                name="zoom"
                                                label="Zoom level"
                                                variant="label-hidden"
                                                value={zoomLevel}
                                                options={zoomOptions}
                                                onchange={handleZoomChange}
                                                class="content-record-zoom-combo">
                                            </lightning-combobox>
                                        </div>
                                    </div>
                                </div>
                                <div class="content-record-document-preview">
                                    <template lwc:if={hasPdfPreview}>
                                        <template lwc:if={usePdfEmbedHost}>
                                            <div
                                                class="content-record-pdf-host"
                                                lwc:dom="manual"></div>
                                        </template>
                                        <template lwc:else>
                                            <iframe
                                                class="content-record-pdf-frame"
                                                title={contentName}
                                                src={previewDocumentUrl}></iframe>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <div class="content-record-preview-placeholder">
                                            <div class="content-record-preview-inner">
                                                <lightning-icon
                                                    icon-name="doctype:pdf"
                                                    size="large"
                                                    class="content-record-preview-icon"
                                                    alternative-text="Document">
                                                </lightning-icon>
                                                <p class="slds-text-body_regular slds-text-color_weak">{contentName}</p>
                                                <p class="slds-text-body_small slds-text-color_weak">Document preview would render here</p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div
                                class="content-record-splitter"
                                role="separator"
                                tabindex="0"
                                aria-orientation="vertical"
                                aria-label="Resize annotation panel"
                                aria-valuenow={sidebarWidthPx}
                                aria-valuemin={sidebarWidthMin}
                                aria-valuemax={sidebarWidthMaxAria}
                                title="Drag to resize panels"
                                onpointerdown={handleSplitterPointerDown}
                                onkeydown={handleSplitterKeyDown}>
                            </div>
                            <aside class="content-record-doc-sidebar" aria-label="Document tools and annotations">
                                <div class="content-record-scoped-shell">
                                <lightning-tabset
                                    variant="scoped"
                                    active-tab-value={scopedPanelTab}
                                    class="content-record-scoped-tabset">
                                    <lightning-tab
                                        class="content-record-scoped-tab"
                                        label={annotationsTabLabel}
                                        value="annotations"
                                        onactive={handleScopedTabActive}>
                                        <div class="content-record-scoped-tab-body">
                                        <div class="content-record-annotations-panel">
                                            <h2 class="content-record-annotations-heading slds-assistive-text">Annotations</h2>
                                            <div class="content-record-annotations-controls">
                                                <lightning-input
                                                    type="search"
                                                    label="Search annotations"
                                                    variant="label-hidden"
                                                    placeholder="Search annotations..."
                                                    class="content-record-annotations-search-field">
                                                </lightning-input>
                                                <div class="content-record-annotations-toolbar">
                                                    <lightning-button-icon
                                                        icon-name="utility:filterList"
                                                        variant="border-filled"
                                                        size="small"
                                                        class="content-record-annotations-filter-btn"
                                                        alternative-text="Filter">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                            <div class="content-record-annotations-list">
                                                <template for:each={annotationItems} for:item="ann">
                                                    <div
                                                        key={ann.id}
                                                        class={ann.cardClass}
                                                        role="article"
                                                        data-id={ann.id}
                                                        onclick={handleAnnotationCardActivate}>
                                                        <div class="content-record-annotation-header">
                                                            <button
                                                                type="button"
                                                                class="content-record-annotation-chevron"
                                                                aria-expanded={ann.expanded}
                                                                onclick={handleAnnotationToggle}
                                                                data-id={ann.id}
                                                                aria-label={ann.expandLabel}>
                                                                <lightning-icon
                                                                    icon-name={ann.expandedIcon}
                                                                    size="x-small"
                                                                    alternative-text="">
                                                                </lightning-icon>
                                                            </button>
                                                            <div class="content-record-annotation-title-cluster">
                                                                <template lwc:if={ann.showAnchorIcon}>
                                                                    <span
                                                                        class="content-record-annotation-status-icon content-record-annotation-status-icon_anchor"
                                                                        title="Marked as anchor"
                                                                        aria-label="Marked as anchor">
                                                                        <lightning-icon
                                                                            icon-name="utility:pinned"
                                                                            size="xx-small"
                                                                            class="content-record-annotation-icon-tint_anchor"
                                                                            alternative-text="">
                                                                        </lightning-icon>
                                                                    </span>
                                                                </template>
                                                                <template lwc:if={ann.flagged}>
                                                                    <span
                                                                        class="content-record-annotation-status-icon content-record-annotation-status-icon_flag"
                                                                        title="Flagged"
                                                                        aria-label="Flagged">
                                                                        <lightning-icon
                                                                            icon-name="utility:flag"
                                                                            size="xx-small"
                                                                            class="content-record-annotation-icon-tint_flag"
                                                                            alternative-text="">
                                                                        </lightning-icon>
                                                                    </span>
                                                                </template>
                                                                <p class="content-record-annotation-ann-code">{ann.displayAnnId}</p>
                                                            </div>
                                                            <div class="content-record-annotation-more-wrap">
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-more content-record-annotation-more_circle"
                                                                    aria-label="More options"
                                                                    aria-haspopup="true"
                                                                    aria-expanded={ann.menuOpen}
                                                                    onclick={handleMoreClick}
                                                                    data-id={ann.id}>
                                                                    <lightning-icon
                                                                        icon-name="utility:threedots"
                                                                        size={ann.headerMenuIconSize}
                                                                        alternative-text="">
                                                                    </lightning-icon>
                                                                </button>
                                                                <template lwc:if={ann.menuOpen}>
                                                                    <div class="content-record-annotation-dropdown" role="menu">
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="copy-link"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Copy link
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="edit"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Edit
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="delete"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Delete
                                                                        </button>
                                                                        <template lwc:if={ann.isResolved}>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item content-record-annotation-menu-item-checked"
                                                                                data-action="resolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Resolve ✓
                                                                            </button>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item"
                                                                                data-action="unresolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Unresolve
                                                                            </button>
                                                                        </template>
                                                                        <template lwc:else>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item"
                                                                                data-action="resolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Resolve
                                                                            </button>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item content-record-annotation-menu-item-checked"
                                                                                data-action="unresolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Unresolve ✓
                                                                            </button>
                                                                        </template>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="assign"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Assign to...
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="add-to-library"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Add to library
                                                                        </button>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                        <div class={ann.metaClass}>
                                                            <lightning-icon
                                                                icon-name="utility:user"
                                                                size="xx-small"
                                                                class="content-record-annotation-user-icon"
                                                                alternative-text="">
                                                            </lightning-icon>
                                                            <a
                                                                href="#"
                                                                class="content-record-annotation-author"
                                                                data-author={ann.createdBy}
                                                                onclick={handleAuthorClick}>
                                                                {ann.createdBy}
                                                            </a>
                                                            <span class="content-record-annotation-dot" aria-hidden="true">·</span>
                                                            <span class="content-record-annotation-time">{ann.timeAgo}</span>
                                                            <span class="content-record-annotation-dot" aria-hidden="true">·</span>
                                                            <span class="content-record-annotation-status-text">{ann.statusLabel}</span>
                                                        </div>
                                                        <template lwc:if={ann.isCollapsed}>
                                                            <div
                                                                class="content-record-annotation-collapsed-badges"
                                                                role="group"
                                                                aria-label="Annotation summary">
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-figma-badge"
                                                                    data-id={ann.id}
                                                                    data-jump="linked"
                                                                    onclick={handleCollapsedSummaryClick}>
                                                                    {ann.linkedClaimsBadgeLabel}
                                                                </button>
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-figma-badge"
                                                                    data-id={ann.id}
                                                                    data-jump="comments"
                                                                    onclick={handleCollapsedSummaryClick}>
                                                                    {ann.commentsBadgeLabel}
                                                                </button>
                                                            </div>
                                                        </template>
                                                        <template lwc:if={ann.expanded}>
                                                            <div class="content-record-annotation-body">
                                                                <template lwc:if={ann.snippet}>
                                                                    <div class="content-record-annotation-snippet">
                                                                        <span class="content-record-annotation-snippet-quote">"{ann.snippet}"</span>
                                                                    </div>
                                                                </template>
                                                                <div class="content-record-annotation-expandable-slot">
                                                                    <div class={ann.linkedClaimsSectionClass}>
                                                                        <h3 class="content-record-annotation-section-heading">
                                                                            <div class="content-record-annotation-section-bar">
                                                                                <button
                                                                                    type="button"
                                                                                    class="content-record-annotation-section-toggle"
                                                                                    aria-expanded={ann.linkedClaimsExpanded}
                                                                                    aria-controls={ann.linkedClaimsPanelId}
                                                                                    id={ann.linkedClaimsToggleId}
                                                                                    data-id={ann.id}
                                                                                    onclick={handleLinkedClaimsToggle}>
                                                                                    <lightning-icon
                                                                                        class="content-record-annotation-section-toggle-icon"
                                                                                        icon-name={ann.linkedClaimsChevron}
                                                                                        size="x-small"
                                                                                        alternative-text="">
                                                                                    </lightning-icon>
                                                                                    <span class="content-record-annotation-section-heading-text">
                                                                                        Linked Claims ({ann.linkedClaimsCount})
                                                                                    </span>
                                                                                </button>
                                                                                <a
                                                                                    href="#"
                                                                                    class="content-record-annotation-section-link content-record-annotation-section-link_bar"
                                                                                    data-id={ann.id}
                                                                                    onclick={handleLinkClaimClick}>
                                                                                    Link Claim
                                                                                </a>
                                                                            </div>
                                                                        </h3>
                                                                        <div
                                                                            id={ann.linkedClaimsPanelId}
                                                                            class="content-record-annotation-section-panel"
                                                                            role="region"
                                                                            aria-labelledby={ann.linkedClaimsToggleId}>
                                                                                    <template lwc:if={ann.linkedClaimsExpanded}>
                                                                                        <template lwc:if={ann.hasLinkedClaims}>
                                                                                            <div class="content-record-annotation-linked-list">
                                                                                                <template for:each={ann.linkedClaims} for:item="lc">
                                                                                                    <div key={lc.code} class={lc.rowClass}>
                                                                                                        <lightning-icon
                                                                                                            icon-name="utility:new_window"
                                                                                                            size="xx-small"
                                                                                                            class="content-record-annotation-linked-ext"
                                                                                                            alternative-text="Opens in new context">
                                                                                                        </lightning-icon>
                                                                                                        <a
                                                                                                            href="#"
                                                                                                            class="content-record-annotation-linked-code"
                                                                                                            onclick={handleLinkClaimClick}
                                                                                                            data-id={ann.id}>
                                                                                                            {lc.code}
                                                                                                        </a>
                                                                                                        <template lwc:if={lc.warn}>
                                                                                                            <span
                                                                                                                class="content-record-annotation-linked-warn-badge"
                                                                                                                title="Unapproved claim">
                                                                                                                <lightning-icon
                                                                                                                    icon-name="utility:warning"
                                                                                                                    size="xx-small"
                                                                                                                    class="content-record-annotation-linked-warn"
                                                                                                                    alternative-text="Warning">
                                                                                                                </lightning-icon>
                                                                                                            </span>
                                                                                                        </template>
                                                                                                        <span class="content-record-annotation-linked-spacer"></span>
                                                                                                        <button
                                                                                                            type="button"
                                                                                                            class="content-record-annotation-linked-more"
                                                                                                            aria-label="Linked claim options"
                                                                                                            data-code={lc.code}
                                                                                                            onclick={handleLinkedClaimMenuClick}>
                                                                                                            <lightning-icon
                                                                                                                icon-name="utility:threedots"
                                                                                                                size="xx-small"
                                                                                                                alternative-text="">
                                                                                                            </lightning-icon>
                                                                                                        </button>
                                                                                                    </div>
                                                                                                </template>
                                                                                            </div>
                                                                                        </template>
                                                                                        <template lwc:else>
                                                                                            <div class="content-record-annotation-section-body">
                                                                                                No linked claims. Use &quot;Link Claim&quot; to add one.
                                                                                            </div>
                                                                                        </template>
                                                                                    </template>
                                                                                </div>
                                                                        </div>
                                                                </div>
                                                                <div class="content-record-annotation-expandable-slot">
                                                                    <div class={ann.commentsSectionClass}>
                                                                        <h3 class="content-record-annotation-section-heading">
                                                                            <div class="content-record-annotation-section-bar">
                                                                                <button
                                                                                    type="button"
                                                                                    class="content-record-annotation-section-toggle"
                                                                                    aria-expanded={ann.commentsExpanded}
                                                                                    aria-controls={ann.commentsPanelId}
                                                                                    id={ann.commentsToggleId}
                                                                                    data-id={ann.id}
                                                                                    onclick={handleCommentsToggle}>
                                                                                    <lightning-icon
                                                                                        class="content-record-annotation-section-toggle-icon"
                                                                                        icon-name={ann.commentsChevron}
                                                                                        size="x-small"
                                                                                        alternative-text="">
                                                                                    </lightning-icon>
                                                                                    <span class="content-record-annotation-section-heading-text">
                                                                                        Comments ({ann.commentsCount})
                                                                                    </span>
                                                                                </button>
                                                                                <a
                                                                                    href="#"
                                                                                    class="content-record-annotation-section-link content-record-annotation-section-link_bar"
                                                                                    data-id={ann.id}
                                                                                    onclick={handleAddCommentClick}>
                                                                                    Add Comment
                                                                                </a>
                                                                            </div>
                                                                        </h3>
                                                                        <div
                                                                            id={ann.commentsPanelId}
                                                                            class="content-record-annotation-section-panel"
                                                                            role="region"
                                                                            aria-labelledby={ann.commentsToggleId}>
                                                                                    <template lwc:if={ann.commentsExpanded}>
                                                                                        <template lwc:if={ann.hasComments}>
                                                                                            <div class="content-record-annotation-comments-list">
                                                                                                <template for:each={ann.comments} for:item="cm">
                                                                                                    <div key={cm.id} class="content-record-annotation-comment">
                                                                                                        <div class="content-record-annotation-comment-hdr">
                                                                                                            <div class={cm.avatarClass} aria-hidden="true">
                                                                                                                <lightning-icon
                                                                                                                    icon-name="utility:user"
                                                                                                                    size="xx-small"
                                                                                                                    alternative-text="">
                                                                                                                </lightning-icon>
                                                                                                            </div>
                                                                                                            <a
                                                                                                                href="#"
                                                                                                                class="content-record-annotation-author content-record-annotation-author_comment"
                                                                                                                data-author={cm.author}
                                                                                                                onclick={handleAuthorClick}>
                                                                                                                {cm.author}
                                                                                                            </a>
                                                                                                            <span class="content-record-annotation-dot" aria-hidden="true">·</span>
                                                                                                            <span class="content-record-annotation-time">{cm.timeAgo}</span>
                                                                                                            <span class="content-record-annotation-comment-spacer"></span>
                                                                                                            <button
                                                                                                                type="button"
                                                                                                                class="content-record-annotation-comment-more"
                                                                                                                aria-label="Comment options"
                                                                                                                data-comment-id={cm.id}
                                                                                                                onclick={handleCommentMenuClick}>
                                                                                                                <lightning-icon
                                                                                                                    icon-name="utility:threedots"
                                                                                                                    size="xx-small"
                                                                                                                    alternative-text="">
                                                                                                                </lightning-icon>
                                                                                                            </button>
                                                                                                        </div>
                                                                                                        <p class="content-record-annotation-comment-body">{cm.body}</p>
                                                                                                        <div class="content-record-annotation-comment-divider" role="separator"></div>
                                                                                                    </div>
                                                                                                </template>
                                                                                            </div>
                                                                                        </template>
                                                                                        <template lwc:else>
                                                                                            <div class="content-record-annotation-section-body">
                                                                                                No comments yet. Use &quot;Add Comment&quot; to add one.
                                                                                            </div>
                                                                                        </template>
                                                                                        <div class="content-record-annotation-composer">
                                                                                            <lightning-textarea
                                                                                                label="Comment"
                                                                                                variant="label-hidden"
                                                                                                placeholder="Comment text..."
                                                                                                value={ann.commentDraftValue}
                                                                                                data-id={ann.id}
                                                                                                onchange={handleCommentDraftChange}
                                                                                                class="content-record-annotation-composer-field">
                                                                                            </lightning-textarea>
                                                                                            <div class="content-record-annotation-composer-actions">
                                                                                                <lightning-button
                                                                                                    label="Save"
                                                                                                    variant="brand"
                                                                                                    data-id={ann.id}
                                                                                                    onclick={handleSaveCommentClick}>
                                                                                                </lightning-button>
                                                                                            </div>
                                                                                        </div>
                                                                                    </template>
                                                                                </div>
                                                                        </div>
                                                                </div>
                                                                <div class="content-record-annotation-anchor">
                                                                    <div class="content-record-anchor-row">
                                                                        <span
                                                                            class="content-record-anchor-text"
                                                                            aria-hidden="true"
                                                                            >Mark as Anchor</span
                                                                        >
                                                                        <lightning-input
                                                                            type="checkbox"
                                                                            label="Mark as Anchor"
                                                                            data-id={ann.id}
                                                                            variant="label-hidden"
                                                                            class="content-record-anchor-input"
                                                                            checked={ann.anchorChecked}
                                                                            onchange={handleAnchorChange}>
                                                                        </lightning-input>
                                                                    </div>
                                                                    <span
                                                                        class="content-record-annotation-info-icon"
                                                                        title="Mark this annotation as an anchor for reference in the document.">
                                                                        <lightning-icon
                                                                            icon-name="utility:info"
                                                                            size="x-small"
                                                                            alternative-text="About anchor">
                                                                        </lightning-icon>
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <template lwc:if={hasNoAnnotations}>
                                                    <div class="content-record-annotations-empty">
                                                        <p class="slds-text-color_weak">No annotations yet</p>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        </div>
                                    </lightning-tab>
                                    <lightning-tab
                                        class="content-record-scoped-tab"
                                        label={contentWorkItemsTabLabel}
                                        value="contentWorkItems"
                                        onactive={handleScopedTabActive}>
                                        <div class="content-record-scoped-tab-body">
                                        <div class="content-record-work-items-panel">
                                            <h2 class="content-record-work-items-heading slds-assistive-text">Content Work items</h2>
                                            <div class="content-record-work-items-toolbar">
                                                <lightning-input
                                                    type="search"
                                                    label="Search work items"
                                                    variant="label-hidden"
                                                    placeholder="Search..."
                                                    class="content-record-work-items-search">
                                                </lightning-input>
                                                <div class="content-record-work-items-toolbar-actions">
                                                    <lightning-button-icon
                                                        icon-name="utility:filterList"
                                                        variant="border-filled"
                                                        size="small"
                                                        class="content-record-work-items-filter-btn"
                                                        alternative-text="Filter">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                            <ul class="content-record-work-items-list" role="list">
                                                <template for:each={contentWorkItems} for:item="w">
                                                    <li key={w.id} class="content-record-work-item" role="listitem">
                                                        <div class="content-record-work-item-icon" aria-hidden="true">
                                                            <lightning-icon
                                                                icon-name="standard:task"
                                                                size="small"
                                                                alternative-text="">
                                                            </lightning-icon>
                                                        </div>
                                                        <div class="content-record-work-item-body">
                                                            <span class="content-record-work-item-name">{w.name}</span>
                                                            <span class="content-record-work-item-meta">
                                                                <span class="content-record-work-item-status">{w.status}</span>
                                                                <span class="content-record-work-item-dot" aria-hidden="true">·</span>
                                                                <span class="content-record-work-item-due">{w.due}</span>
                                                            </span>
                                                        </div>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                        </div>
                                    </lightning-tab>
                                </lightning-tabset>
                                </div>
                            </aside>
                        </div>
                    </div>
                </lightning-tab>
                <lightning-tab label="Review &amp; Approval" value="review" onactive={handleMainTabActive}>
                    <div class="content-record-tab-placeholder slds-p-around_medium">
                        <p class="slds-text-color_weak">Review &amp; Approval content</p>
                    </div>
                </lightning-tab>
                <lightning-tab label="Audit Trail" value="audit" onactive={handleMainTabActive}>
                    <div class="content-record-tab-placeholder slds-p-around_medium">
                        <p class="slds-text-color_weak">Audit Trail content</p>
                    </div>
                </lightning-tab>
                <lightning-tab label="Related" value="related" onactive={handleMainTabActive}>
                    <div class="content-record-related slds-p-around_medium">
                        <div class="content-record-related-list-header">
                            <h3 class="content-record-related-title">Parent Collection</h3>
                        </div>
                        <template lwc:if={parentCollectionName}>
                            <div class="content-record-related-item">
                                <lightning-icon
                                    icon-name="standard:folder"
                                    size="x-small"
                                    alternative-text="Collection">
                                </lightning-icon>
                                <a href="#" class="content-record-link" onclick={handleParentCollectionClick}>{parentCollectionName}</a>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="content-record-empty">No parent collection</div>
                        </template>
                    </div>
                </lightning-tab>
            </lightning-tabset>
            </div>
        </div>
    </article>
</template>
