<template>
    <article class="slds-card content-record-page-card">
        <div class="content-record-page-inner">
            <!-- Figma: Regulated Content record header (457:75280) — single surface-2 block -->
            <div class="content-record-page-header-shell">
                <div class="content-record-page-header">
                    <div class="content-record-page-header-main">
                        <div class="content-record-page-header-icon" aria-hidden="true">
                            <lightning-icon
                                icon-name="standard:document"
                                size="large"
                                alternative-text="Regulated Content">
                            </lightning-icon>
                        </div>
                        <div class="content-record-page-header-titles">
                            <p class="content-record-eyebrow">Regulated Content</p>
                            <h1 class="content-record-page-title">{recordTitle}</h1>
                        </div>
                    </div>
                    <div class="content-record-page-header-actions" role="group" aria-label="Record actions">
                        <template lwc:if={showBackToCollection}>
                            <lightning-button
                                label="Back to collection"
                                variant="neutral"
                                icon-name="utility:chevronleft"
                                title="Open this collection in the workspace"
                                onclick={handleBackToCollectionClick}>
                            </lightning-button>
                        </template>
                        <lightning-button
                            label="Follow"
                            variant="brand-outline"
                            icon-name="utility:add">
                        </lightning-button>
                        <div class="slds-button-group" role="group" aria-label="Edit actions">
                            <lightning-button label="Edit" variant="neutral" onclick={handleEdit}></lightning-button>
                            <lightning-button label="Delete" variant="neutral"></lightning-button>
                            <lightning-button label="Clone" variant="neutral"></lightning-button>
                        </div>
                        <lightning-button-icon
                            icon-name="utility:threedots_vertical"
                            variant="border-filled"
                            alternative-text="More actions">
                        </lightning-button-icon>
                    </div>
                </div>
                <div class="content-record-highlight-panel">
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Content Type</span>
                        <span class="content-record-highlight-value">{contentTypeDisplay}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Version</span>
                        <span class="content-record-highlight-value">{contentVersion}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Status</span>
                        <span class="content-record-highlight-value">{contentStatus}</span>
                    </div>
                    <div class="content-record-highlight-field">
                        <span class="content-record-highlight-label">Effective Dates</span>
                        <span class="content-record-highlight-value">{effectiveDates}</span>
                    </div>
                </div>
            </div>

            <!-- Figma: Path (457:75282) — stages + 8px gap + Extract + Send for review split -->
            <div class="content-record-path-actions">
                <div class="content-record-path-figma">
                    <div class="content-record-path-stages" role="list" aria-label="Content workflow">
                        <div class={pathDraftClass} role="listitem">
                            <span class="content-path-seg-label">Draft</span>
                        </div>
                        <div class={pathReviewClass} role="listitem">
                            <span class="content-path-seg-label">Review</span>
                        </div>
                        <div class={pathApproveClass} role="listitem">
                            <span class="content-path-seg-label">Approve</span>
                        </div>
                        <div class={pathArchiveClass} role="listitem">
                            <span class="content-path-seg-label">Archive</span>
                        </div>
                    </div>
                    <lightning-button
                        label="Extract &amp; Match Claims"
                        variant="brand-outline"
                        icon-name="utility:sparkles"
                        class="content-record-extract-btn">
                    </lightning-button>
                    <div class="content-record-send-split slds-button-group" role="group" aria-label="Send for review">
                        <lightning-button
                            label="Send for review"
                            variant="neutral"
                            class="content-record-btn-send-review">
                        </lightning-button>
                        <lightning-button-icon
                            icon-name="utility:down"
                            variant="border-filled"
                            class="content-record-btn-send-review-chevron"
                            alternative-text="More send options">
                        </lightning-button-icon>
                    </div>
                </div>
            </div>

            <!-- Main tabs + body (Figma: Regulated Content record tabs + two-column viewer) -->
            <lightning-tabset active-tab-value={activeTab} class="content-record-main-tabset">
                <lightning-tab label="Document" value="document" onactive={handleMainTabActive}>
                    <div class="content-record-tab-panel content-record-tab-panel_document">
                        <div class="content-record-doc-layout">
                            <div class="content-record-doc-main">
                                <div class="content-record-viewer-toolbar">
                                    <div class="content-record-viewer-toolbar-row">
                                        <div class="content-record-file-title">
                                            <lightning-icon
                                                icon-name={contentIcon}
                                                size="x-small"
                                                alternative-text="File type">
                                            </lightning-icon>
                                            <span class="content-record-file-name">{displayFileName}</span>
                                        </div>
                                        <div class="content-record-viewer-toolbar-actions">
                                            <lightning-button
                                                label="Download"
                                                variant="neutral"
                                                icon-name="utility:download">
                                            </lightning-button>
                                            <lightning-button-icon
                                                icon-name="utility:threedots"
                                                variant="border-filled"
                                                alternative-text="More file options">
                                            </lightning-button-icon>
                                        </div>
                                    </div>
                                    <div class="content-record-viewer-toolbar-row content-record-viewer-toolbar-row_paging">
                                        <div class="content-record-paging">
                                            <lightning-button-icon
                                                icon-name="utility:chevronleft"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="First page">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:chevronleft"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Previous page">
                                            </lightning-button-icon>
                                            <span class="content-record-page-indicator">{currentPage} of {totalPages}</span>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Next page">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Last page">
                                            </lightning-button-icon>
                                        </div>
                                        <div class="content-record-viewer-tools">
                                            <lightning-button-icon
                                                icon-name="utility:search"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Search in document">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:zoomin"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Zoom in">
                                            </lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:zoomout"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Zoom out">
                                            </lightning-button-icon>
                                            <lightning-combobox
                                                name="zoom"
                                                label="Zoom level"
                                                variant="label-hidden"
                                                value={zoomLevel}
                                                options={zoomOptions}
                                                onchange={handleZoomChange}
                                                class="content-record-zoom-combo">
                                            </lightning-combobox>
                                        </div>
                                    </div>
                                </div>
                                <div class="content-record-document-preview">
                                    <div class="content-record-preview-placeholder">
                                        <div class="content-record-preview-inner">
                                            <lightning-icon
                                                icon-name="doctype:pdf"
                                                size="large"
                                                class="content-record-preview-icon"
                                                alternative-text="Document">
                                            </lightning-icon>
                                            <p class="slds-text-body_regular slds-text-color_weak">{contentName}</p>
                                            <p class="slds-text-body_small slds-text-color_weak">Document preview would render here</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div
                                class="content-record-splitter"
                                role="separator"
                                tabindex="0"
                                aria-orientation="vertical"
                                aria-label="Resize annotation panel"
                                aria-valuenow={sidebarWidthPx}
                                aria-valuemin={sidebarWidthMin}
                                aria-valuemax={sidebarWidthMaxAria}
                                title="Drag to resize panels"
                                onpointerdown={handleSplitterPointerDown}
                                onkeydown={handleSplitterKeyDown}>
                            </div>
                            <aside class="content-record-doc-sidebar" aria-label="Document tools and annotations">
                                <lightning-tabset variant="scoped" active-tab-value={scopedPanelTab} class="content-record-scoped-tabset">
                                    <lightning-tab label={annotationsTabLabel} value="annotations" onactive={handleScopedTabActive}>
                                        <div class="content-record-annotations-panel slds-p-around_small">
                                            <h2 class="content-record-annotations-heading slds-assistive-text">Annotations</h2>
                                            <div class="content-record-annotations-controls">
                                                <lightning-input
                                                    type="search"
                                                    label="Search annotations"
                                                    variant="label-hidden"
                                                    placeholder="Search annotations..."
                                                    class="content-record-annotations-search-field">
                                                </lightning-input>
                                                <div class="content-record-annotations-toolbar">
                                                    <lightning-button-icon
                                                        icon-name="utility:sort"
                                                        variant="bare"
                                                        size="small"
                                                        alternative-text="Sort">
                                                    </lightning-button-icon>
                                                    <lightning-button-icon
                                                        icon-name="utility:filterList"
                                                        variant="bare"
                                                        size="small"
                                                        alternative-text="Filter">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                            <div class="content-record-annotations-list">
                                                <template for:each={annotationItems} for:item="ann">
                                                    <div key={ann.id} class={ann.cardClass}>
                                                        <div class="content-record-annotation-header">
                                                            <button
                                                                type="button"
                                                                class="content-record-annotation-chevron"
                                                                aria-expanded={ann.expanded}
                                                                onclick={handleAnnotationToggle}
                                                                data-id={ann.id}
                                                                aria-label={ann.expandLabel}>
                                                                <lightning-icon
                                                                    icon-name={ann.expandedIcon}
                                                                    size="x-small"
                                                                    alternative-text="">
                                                                </lightning-icon>
                                                            </button>
                                                            <h3 class="content-record-annotation-title-heading">
                                                                <span class="content-record-annotation-id-pref">Annotation ID</span>
                                                                <span class="content-record-annotation-id-sep" aria-hidden="true">–</span>
                                                                <span class="content-record-annotation-id-num">{ann.id}</span>
                                                            </h3>
                                                            <div class="content-record-annotation-more-wrap">
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-more"
                                                                    aria-label="More options"
                                                                    aria-haspopup="true"
                                                                    aria-expanded={ann.menuOpen}
                                                                    onclick={handleMoreClick}
                                                                    data-id={ann.id}>
                                                                    <lightning-icon
                                                                        icon-name="utility:threedots"
                                                                        size="x-small"
                                                                        alternative-text="">
                                                                    </lightning-icon>
                                                                </button>
                                                                <template lwc:if={ann.menuOpen}>
                                                                    <div class="content-record-annotation-dropdown" role="menu">
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="copy-link"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Copy link
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="edit"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Edit
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="delete"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Delete
                                                                        </button>
                                                                        <template lwc:if={ann.isResolved}>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item content-record-annotation-menu-item-checked"
                                                                                data-action="resolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Resolve ✓
                                                                            </button>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item"
                                                                                data-action="unresolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Unresolve
                                                                            </button>
                                                                        </template>
                                                                        <template lwc:else>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item"
                                                                                data-action="resolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Resolve
                                                                            </button>
                                                                            <button
                                                                                type="button"
                                                                                role="menuitem"
                                                                                class="content-record-annotation-menu-item content-record-annotation-menu-item-checked"
                                                                                data-action="unresolve"
                                                                                data-id={ann.id}
                                                                                onclick={handleMoreOptionSelect}>
                                                                                Unresolve ✓
                                                                            </button>
                                                                        </template>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="assign"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Assign to...
                                                                        </button>
                                                                        <button
                                                                            type="button"
                                                                            role="menuitem"
                                                                            class="content-record-annotation-menu-item"
                                                                            data-action="add-to-library"
                                                                            data-id={ann.id}
                                                                            onclick={handleMoreOptionSelect}>
                                                                            Add to library
                                                                        </button>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                        <template lwc:if={ann.expanded}>
                                                            <div class="content-record-annotation-body">
                                                            <div class="content-record-annotation-meta">
                                                                <lightning-icon
                                                                    icon-name="utility:user"
                                                                    size="xx-small"
                                                                    class="content-record-annotation-user-icon"
                                                                    alternative-text="">
                                                                </lightning-icon>
                                                                <a
                                                                    href="#"
                                                                    class="content-record-annotation-author"
                                                                    data-author={ann.createdBy}
                                                                    onclick={handleAuthorClick}>
                                                                    {ann.createdBy}
                                                                </a>
                                                                <span class="content-record-annotation-dot" aria-hidden="true">·</span>
                                                                <span class="content-record-annotation-time">{ann.timeAgo}</span>
                                                                <span class="content-record-annotation-dot" aria-hidden="true">·</span>
                                                                <a
                                                                    href="#"
                                                                    class="content-record-annotation-status"
                                                                    data-id={ann.id}
                                                                    onclick={handleStatusClick}>
                                                                    {ann.statusLabel}
                                                                </a>
                                                            </div>
                                                            <template lwc:if={ann.snippet}>
                                                                <div class="content-record-annotation-snippet">
                                                                    <span class="content-record-annotation-snippet-quote">"{ann.snippet}"</span>
                                                                </div>
                                                            </template>
                                                            <div class="content-record-annotation-section">
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-section-row"
                                                                    data-id={ann.id}
                                                                    onclick={handleLinkedClaimsToggle}>
                                                                    <lightning-icon
                                                                        icon-name={ann.linkedClaimsChevron}
                                                                        size="xx-small"
                                                                        class="content-record-annotation-section-chevron"
                                                                        alternative-text="">
                                                                    </lightning-icon>
                                                                    <span class="content-record-annotation-section-label">Linked Claims ({ann.linkedClaimsCount})</span>
                                                                </button>
                                                                <a
                                                                    href="#"
                                                                    class="content-record-annotation-section-link"
                                                                    data-id={ann.id}
                                                                    onclick={handleLinkClaimClick}>
                                                                    Link Claim
                                                                </a>
                                                            </div>
                                                            <template lwc:if={ann.linkedClaimsExpanded}>
                                                                <div class="content-record-annotation-section-body">No linked claims. Use "Link Claim" to add one.</div>
                                                            </template>
                                                            <div class="content-record-annotation-section">
                                                                <button
                                                                    type="button"
                                                                    class="content-record-annotation-section-row"
                                                                    data-id={ann.id}
                                                                    onclick={handleCommentsToggle}>
                                                                    <lightning-icon
                                                                        icon-name={ann.commentsChevron}
                                                                        size="xx-small"
                                                                        class="content-record-annotation-section-chevron"
                                                                        alternative-text="">
                                                                    </lightning-icon>
                                                                    <span class="content-record-annotation-section-label">Comments ({ann.commentsCount})</span>
                                                                </button>
                                                                <a
                                                                    href="#"
                                                                    class="content-record-annotation-section-link"
                                                                    data-id={ann.id}
                                                                    onclick={handleAddCommentClick}>
                                                                    Add Comment
                                                                </a>
                                                            </div>
                                                            <template lwc:if={ann.commentsExpanded}>
                                                                <div class="content-record-annotation-section-body">No comments yet. Use "Add Comment" to add one.</div>
                                                            </template>
                                                            <div class="content-record-annotation-anchor">
                                                                <div class="content-record-anchor-checkbox-wrap">
                                                                    <lightning-input
                                                                        type="checkbox"
                                                                        label="Mark as Anchor"
                                                                        data-id={ann.id}
                                                                        variant="label-inline"
                                                                        class="content-record-anchor-input"
                                                                        checked={ann.anchorChecked}
                                                                        onchange={handleAnchorChange}>
                                                                    </lightning-input>
                                                                </div>
                                                                <span
                                                                    class="content-record-annotation-info-icon"
                                                                    title="Mark this annotation as an anchor for reference in the document.">
                                                                    <lightning-icon
                                                                        icon-name="utility:info"
                                                                        size="xx-small"
                                                                        alternative-text="About anchor">
                                                                    </lightning-icon>
                                                                </span>
                                                            </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <template lwc:if={hasNoAnnotations}>
                                                    <div class="content-record-annotations-empty">
                                                        <p class="slds-text-color_weak">No annotations yet</p>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </lightning-tab>
                                    <lightning-tab label={contentWorkItemsTabLabel} value="contentWorkItems" onactive={handleScopedTabActive}>
                                        <div class="content-record-work-items-panel slds-p-around_small">
                                            <h2 class="content-record-work-items-heading slds-assistive-text">Content Work items</h2>
                                            <div class="content-record-work-items-toolbar">
                                                <lightning-input
                                                    type="search"
                                                    label="Search work items"
                                                    variant="label-hidden"
                                                    placeholder="Search..."
                                                    class="content-record-work-items-search">
                                                </lightning-input>
                                                <div class="content-record-work-items-toolbar-actions">
                                                    <lightning-button-icon
                                                        icon-name="utility:sort"
                                                        variant="bare"
                                                        size="small"
                                                        alternative-text="Sort">
                                                    </lightning-button-icon>
                                                    <lightning-button-icon
                                                        icon-name="utility:filterList"
                                                        variant="bare"
                                                        size="small"
                                                        alternative-text="Filter">
                                                    </lightning-button-icon>
                                                </div>
                                            </div>
                                            <ul class="content-record-work-items-list" role="list">
                                                <template for:each={contentWorkItems} for:item="w">
                                                    <li key={w.id} class="content-record-work-item" role="listitem">
                                                        <div class="content-record-work-item-icon" aria-hidden="true">
                                                            <lightning-icon
                                                                icon-name="standard:task"
                                                                size="small"
                                                                alternative-text="">
                                                            </lightning-icon>
                                                        </div>
                                                        <div class="content-record-work-item-body">
                                                            <span class="content-record-work-item-name">{w.name}</span>
                                                            <span class="content-record-work-item-meta">
                                                                <span class="content-record-work-item-status">{w.status}</span>
                                                                <span class="content-record-work-item-dot" aria-hidden="true">·</span>
                                                                <span class="content-record-work-item-due">{w.due}</span>
                                                            </span>
                                                        </div>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </lightning-tab>
                                </lightning-tabset>
                            </aside>
                        </div>
                    </div>
                </lightning-tab>
                <lightning-tab label="Review &amp; Approval" value="review" onactive={handleMainTabActive}>
                    <div class="content-record-tab-placeholder slds-p-around_medium">
                        <p class="slds-text-color_weak">Review &amp; Approval content</p>
                    </div>
                </lightning-tab>
                <lightning-tab label="Audit Trail" value="audit" onactive={handleMainTabActive}>
                    <div class="content-record-tab-placeholder slds-p-around_medium">
                        <p class="slds-text-color_weak">Audit Trail content</p>
                    </div>
                </lightning-tab>
                <lightning-tab label="Related" value="related" onactive={handleMainTabActive}>
                    <div class="content-record-related slds-p-around_medium">
                        <div class="content-record-related-list-header">
                            <h3 class="content-record-related-title">Parent Collection</h3>
                        </div>
                        <template lwc:if={parentCollectionName}>
                            <div class="content-record-related-item">
                                <lightning-icon
                                    icon-name="standard:folder"
                                    size="x-small"
                                    alternative-text="Collection">
                                </lightning-icon>
                                <a href="#" class="content-record-link" onclick={handleParentCollectionClick}>{parentCollectionName}</a>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="content-record-empty">No parent collection</div>
                        </template>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </div>
    </article>
</template>
