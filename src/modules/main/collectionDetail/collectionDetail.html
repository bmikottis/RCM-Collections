<template>
    <div class="collection-detail-container">
        
        <!-- Record Page Header -->
        <div class="record-header">
            <div class="record-header-top">
                <div class="record-header-icon">
                    <lightning-icon 
                        icon-name="standard:folder" 
                        size="medium"
                        alternative-text="Collection">
                    </lightning-icon>
                </div>
                <div class="record-header-info">
                    <div class="record-name-row">
                        <h1 class="record-name">{collection.name}</h1>
                        <template lwc:if={hasRigidStructure}>
                            <span class="record-structure-badge" title="This collection uses a template with a fixed, required structure that cannot be modified.">
                                <lightning-icon icon-name="utility:lock" size="xx-small" class="record-structure-lock-icon" alternative-text=""></lightning-icon>
                                <span class="record-structure-label">Required structure</span>
                            </span>
                        </template>
                    </div>
                </div>
                <div class="record-header-actions">
                    <lightning-button 
                        label="View Details" 
                        variant="neutral" 
                        onclick={handleOpenRecord}
                        title="View full record page">
                    </lightning-button>
                </div>
            </div>
            
            <!-- Key Fields Row -->
            <div class="record-header-fields">
                <div class="header-field">
                    <span class="field-label">Status</span>
                    <span class="field-value">{statusValue}</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Collection Type</span>
                    <span class="field-value">{collectionKind}</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Template</span>
                    <span class="field-value">
                        <a href="#" class="template-link" onclick={handleTemplateClick}>{templateValue}</a>
                    </span>
                </div>
                <div class="header-field">
                    <span class="field-label">Region</span>
                    <span class="field-value">{regionValue}</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Created Date</span>
                    <span class="field-value placeholder-value">—</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Last Modified</span>
                    <span class="field-value placeholder-value">—</span>
                </div>
            </div>
        </div>
        
        <!-- Completeness Indicator (for template-based collections) -->
        <template lwc:if={isFromTemplate}>
            <div class="completeness-section">
                <div class="completeness-ring-container">
                    <svg class="completeness-ring" viewBox="0 0 100 100">
                        <circle class="ring-background" cx="50" cy="50" r="40" />
                        <circle class="ring-progress" cx="50" cy="50" r="40" style={progressRingStyle} />
                    </svg>
                    <div class="completeness-percentage">
                        <span class="percentage-value">{completenessPercentage}%</span>
                        <span class="percentage-label">Complete</span>
                    </div>
                </div>
                <div class="completeness-details">
                    <h3 class="completeness-title">Collection Readiness</h3>
                    <p class="completeness-subtitle">{completenessLabel}</p>
                    <div class="completeness-breakdown">
                        <template lwc:if={hasTemplateChildren}>
                            <div class="breakdown-item">
                                <lightning-icon icon-name="utility:open_folder" size="x-small" alternative-text="Child Collections"></lightning-icon>
                                <span class="breakdown-label">Child Collections</span>
                                <span class="breakdown-value">{childrenSummary}</span>
                            </div>
                        </template>
                        <div class="breakdown-item">
                            <lightning-icon icon-name="utility:file" size="x-small" alternative-text="Content"></lightning-icon>
                            <span class="breakdown-label">Required Content</span>
                            <span class="breakdown-value">{contentSummary}</span>
                        </div>
                        <div class="breakdown-item">
                            <lightning-icon icon-name="utility:task" size="x-small" alternative-text="Tasks"></lightning-icon>
                            <span class="breakdown-label">Required Tasks</span>
                            <span class="breakdown-value">{taskSummary}</span>
                        </div>
                        <div class="breakdown-item">
                            <lightning-icon icon-name="utility:approval" size="x-small" alternative-text="Approvals"></lightning-icon>
                            <span class="breakdown-label">Approvals</span>
                            <span class="breakdown-value">{approvalsSummary}</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Workflow path (Draft → Review → Approve → Archive) below completeness -->
            <div class="workflow-path-section">
                <div class="workflow-path" role="list" aria-label="Collection workflow">
                    <div class={workflowStepDraftClass} role="listitem">
                        <template lwc:if={isDraftStepCompleted}>
                            <lightning-icon icon-name="utility:check" size="x-small" alternative-text="Complete" class="workflow-step-check"></lightning-icon>
                        </template>
                        <template lwc:else>
                            <span class="workflow-step-label">Draft</span>
                        </template>
                    </div>
                    <div class={workflowStepReviewClass} role="listitem">
                        <template lwc:if={isReviewStepCompleted}>
                            <lightning-icon icon-name="utility:check" size="x-small" alternative-text="Complete" class="workflow-step-check"></lightning-icon>
                        </template>
                        <template lwc:else>
                            <span class="workflow-step-label">Review</span>
                        </template>
                    </div>
                    <div class={workflowStepApproveClass} role="listitem">
                        <template lwc:if={isApproveStepCompleted}>
                            <lightning-icon icon-name="utility:check" size="x-small" alternative-text="Complete" class="workflow-step-check"></lightning-icon>
                        </template>
                        <template lwc:else>
                            <span class="workflow-step-label">Approve</span>
                        </template>
                    </div>
                    <div class={workflowStepArchiveClass} role="listitem">
                        <span class="workflow-step-label">Archive</span>
                    </div>
                </div>
                <div class="workflow-path-actions">
                    <lightning-button-menu label={workflowActionLabel} variant="neutral" alternative-text={workflowActionLabel} icon-name="utility:down" icon-position="right" menu-alignment="right">
                        <template lwc:for-each={workflowActionMenuItems} lwc:for-item="item" lwc:key={item.value}>
                            <lightning-menu-item value={item.value} label={item.label}></lightning-menu-item>
                        </template>
                    </lightning-button-menu>
                </div>
            </div>
        </template>
        
        <!-- Empty State: Template-based collection with no children and no content -->
        <template lwc:if={showTemplateEmptyState}>
            <div class="collection-empty-state" role="status" aria-label="Collection is empty">
                <div class="collection-empty-state-icon-wrap">
                    <lightning-icon icon-name="standard:folder_open" size="large" class="collection-empty-state-icon" alternative-text=""></lightning-icon>
                </div>
                <h2 class="slds-text-heading_medium collection-empty-state-title">Get started with your collection</h2>
                <p class="slds-text-body_regular slds-text-color_weak collection-empty-state-body">
                    This collection uses the <strong>{templateName}</strong> template. Add child collections to build the structure, then add content to meet the template requirements.
                </p>
                <div class="collection-empty-state-actions">
                    <lightning-button label="Add child collection" variant="neutral" class="collection-empty-state-primary" title="Add a child collection"></lightning-button>
                    <lightning-button label="Find required content" variant="neutral" onclick={handleFindRequiredContent} title="Find required content"></lightning-button>
                </div>
            </div>
        </template>
        
        <!-- Content Cards - New Layout for Template Collections (when not empty) -->
        <template lwc:if={showTemplateCards}>
            <div class="cards-container">
                <div class="cards-layout-template">
                    
                    <!-- Left Column (1/3) - Child Collections + Members -->
                    <div class="left-column">
                        <!-- Child Collections Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:folder" 
                                        size="small"
                                        alternative-text="Child Collections">
                                    </lightning-icon>
                                    <span class="nested-card-title">Child Collections</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <template lwc:if={isLocked}>
                                    </template>
                                    <template lwc:else>
                                        <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                    </template>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasChildren}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={childCollections} for:item="child">
                                            <li key={child.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center child-item" 
                                                     onclick={handleChildClick} 
                                                     data-id={child.id}
                                                     tabindex="0"
                                                     onkeydown={handleChildKeyDown}>
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name="utility:open_folder" 
                                                            size="small"
                                                            alternative-text="Collection">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <span class="slds-text-link child-name">{child.name}</span>
                                                        <template lwc:if={child.hasCompleteness}>
                                                            <div class="mini-progress-container">
                                                                <div class="mini-progress-bar">
                                                                    <div class="mini-progress-fill" style={child.progressStyle}></div>
                                                                </div>
                                                                <span class="mini-progress-label">{child.completenessLabel}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse">
                                                        <lightning-icon 
                                                            icon-name="utility:chevronright" 
                                                            size="x-small"
                                                            alternative-text="Navigate">
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="utility:open_folder" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No child collections. Add one to organize content.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <!-- Members/Collaborators Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:user" 
                                        size="small"
                                        alternative-text="Members">
                                    </lightning-icon>
                                    <span class="nested-card-title">Members</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasMembers}>
                                <ul class="slds-list_vertical">
                                    <template for:each={members} for:item="member">
                                        <li key={member.id} class="slds-list__item list-item">
                                            <div class="slds-media slds-media_center member-item">
                                                <div class="slds-media__figure">
                                                    <div class="member-avatar">
                                                        <lightning-icon 
                                                            icon-name="utility:user" 
                                                            size="x-small"
                                                            alternative-text={member.name}>
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                                <div class="slds-media__body">
                                                    <span class="member-name">{member.name}</span>
                                                    <span class="member-role">{member.role}</span>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="utility:user" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No members. Add collaborators to this collection.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column (2/3) - Template Requirements + Collection Content -->
                    <div class="right-column">
                        <div class="nested-card requirements-card">
                            <div class="nested-card-header requirements-header">
                                <div class="nested-card-header-left">
                                    <span class="nested-card-title">Template Requirements</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <button class="agentic-button" onclick={handleFindRequiredContent}>
                                        <svg class="agentic-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                            <path d="M21.4387 16.7414L17.25 18.8257C15.9916 19.4529 14.9737 20.4674 14.3445 21.7217L12.2532 25.8965C11.9571 26.4929 11.0996 26.4929 10.8035 25.8965L8.71223 21.7217C8.083 20.4674 7.06513 19.4529 5.80667 18.8257L1.61798 16.7414C1.01959 16.4463 1.01959 15.5916 1.61798 15.2965L5.80667 13.2122C7.06513 12.585 8.083 11.5705 8.71223 10.3162L10.8035 6.14138C11.0996 5.54498 11.9571 5.54498 12.2532 6.14138L14.3445 10.3162C14.9737 11.5705 15.9916 12.585 17.25 13.2122L21.4387 15.2965C22.0371 15.5916 22.0371 16.4463 21.4387 16.7414ZM30.5749 26.0256L28.7797 25.128C28.2369 24.8636 27.805 24.4209 27.5336 23.886L26.6329 22.0968C26.5096 21.8385 26.1394 21.8385 26.0099 22.0968L25.1092 23.886C24.8439 24.427 24.3998 24.8574 23.8631 25.128L22.0679 26.0256C21.8088 26.1486 21.8088 26.5175 22.0679 26.6466L23.8631 27.5443C24.406 27.8087 24.8378 28.2514 25.1092 28.7863L26.0099 30.5755C26.1332 30.8338 26.5034 30.8338 26.6329 30.5755L27.5336 28.7863C27.7989 28.2453 28.243 27.8149 28.7797 27.5443L30.5749 26.6466C30.834 26.5237 30.834 26.1548 30.5749 26.0256ZM30.5749 5.37282L28.7797 4.47514C28.2369 4.21075 27.805 3.76806 27.5336 3.23314L26.6329 1.44392C26.5096 1.18568 26.1394 1.18568 26.0099 1.44392L25.1092 3.23314C24.8439 3.77421 24.3998 4.2046 23.8631 4.47514L22.0679 5.37282C21.8088 5.49579 21.8088 5.8647 22.0679 5.99382L23.8631 6.8915C24.406 7.15588 24.8378 7.59858 25.1092 8.1335L26.0099 9.92271C26.1332 10.1809 26.5034 10.1809 26.6329 9.92271L27.5336 8.1335C27.7989 7.59243 28.243 7.16203 28.7797 6.8915L30.5749 5.99382C30.834 5.87085 30.834 5.50194 30.5749 5.37282Z" fill="currentColor"/>
                                        </svg>
                                        <span>Find Required Content</span>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Tabs -->
                            <div class="requirements-tabs">
                                <button class={contentTabClass} onclick={handleContentTabClick}>
                                    <lightning-icon icon-name="utility:file" size="x-small" alternative-text="Content"></lightning-icon>
                                    <span>Required Content</span>
                                </button>
                                <button class={tasksTabClass} onclick={handleTasksTabClick}>
                                    <lightning-icon icon-name="utility:task" size="x-small" alternative-text="Tasks"></lightning-icon>
                                    <span>Required Tasks</span>
                                </button>
                                <button class={approvalsTabClass} onclick={handleApprovalsTabClick}>
                                    <lightning-icon icon-name="utility:approval" size="x-small" alternative-text="Approvals"></lightning-icon>
                                    <span>Reviews &amp; Approvals</span>
                                </button>
                            </div>
                            
                            <!-- Tab Content -->
                            <div class="requirements-tab-content">
                                <!-- Content Tab -->
                                <template lwc:if={isContentTabActive}>
                                    <div class="content-checklist">
                                        <template for:each={contentChecklist} for:item="item">
                                            <div key={item.id} class={item.statusClass}>
                                                <div class="checklist-icon">
                                                    <lightning-icon 
                                                        icon-name={item.icon} 
                                                        size="x-small"
                                                        variant={item.iconVariant}
                                                        alternative-text={item.statusLabel}>
                                                    </lightning-icon>
                                                </div>
                                                <div class="checklist-content">
                                                    <span class="checklist-name">{item.name}</span>
                                                    <template lwc:if={item.isCompleted}>
                                                        <span class="checklist-file">{item.addedFileName}</span>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="checklist-description">{item.description}</span>
                                                    </template>
                                                </div>
                                                <div class="checklist-status">
                                                    <template lwc:if={item.isCompleted}>
                                                        <div class="added-badge-menu-wrapper">
                                                            <button class="added-badge-button" data-id={item.id} onclick={handleAddedBadgeClick}>
                                                                Added
                                                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" alternative-text="Menu"></lightning-icon>
                                                            </button>
                                                            <template lwc:if={item.showMenu}>
                                                                <div class="added-badge-dropdown">
                                                                    <button class="dropdown-menu-item" data-id={item.id} onclick={handleViewContent}>View</button>
                                                                    <button class="dropdown-menu-item" data-id={item.id} onclick={handleReplaceContent}>Replace</button>
                                                                    <button class="dropdown-menu-item dropdown-menu-item-danger" data-id={item.id} onclick={handleRemoveRequiredContent}>Remove</button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    <template lwc:else>
                                                        <lightning-button label="Add" variant="neutral" class="checklist-action-button"></lightning-button>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                
                                <!-- Tasks Tab -->
                                <template lwc:if={isTasksTabActive}>
                                    <template lwc:if={hasTasks}>
                                        <div class="content-checklist">
                                            <template for:each={taskChecklist} for:item="task">
                                                <div key={task.id} class={task.statusClass}>
                                                    <div class="checklist-icon">
                                                        <lightning-icon 
                                                            icon-name={task.icon} 
                                                            size="x-small"
                                                            variant={task.iconVariant}
                                                            alternative-text={task.statusLabel}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="checklist-content">
                                                        <span class="checklist-name">{task.name}</span>
                                                        <span class="task-category">{task.category}</span>
                                                    </div>
                                                    <div class="checklist-status">
                                                        <template lwc:if={task.isCompleted}>
                                                            <lightning-badge label="Complete" class="status-badge-success"></lightning-badge>
                                                        </template>
                                                        <template lwc:else>
                                                            <lightning-button label="Mark Complete" variant="neutral" class="checklist-action-button"></lightning-button>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-card-state">
                                            <p class="slds-text-color_weak">No required tasks for this template</p>
                                        </div>
                                    </template>
                                </template>

                                <!-- Approvals Tab -->
                                <template lwc:if={isApprovalsTabActive}>
                                    <template lwc:if={hasApprovals}>
                                        <div class="content-checklist">
                                            <template for:each={approvalsChecklist} for:item="approval">
                                                <div key={approval.id} class={approval.statusClass}>
                                                    <div class="checklist-icon">
                                                        <lightning-icon 
                                                            icon-name={approval.icon} 
                                                            size="x-small"
                                                            variant={approval.iconVariant}
                                                            alternative-text={approval.statusLabel}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="checklist-content">
                                                        <span class="checklist-name">{approval.name}</span>
                                                        <span class="task-category">{approval.approver}</span>
                                                    </div>
                                                    <div class="checklist-status">
                                                        <template lwc:if={approval.isCompleted}>
                                                            <lightning-badge label="Approved" class="status-badge-success"></lightning-badge>
                                                        </template>
                                                        <template lwc:else>
                                                            <lightning-button label="Request" variant="neutral" class="checklist-action-button"></lightning-button>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-card-state">
                                            <p class="slds-text-color_weak">No approvals required for this template</p>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>

                        <!-- Collection Content Card -->
                        <div class="nested-card collection-content-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:file" 
                                        size="small"
                                        alternative-text="Collection Content">
                                    </lightning-icon>
                                    <span class="nested-card-title">Collection Content</span>
                                    <span class="content-count">{collectionContentCount}</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <template lwc:if={isLocked}>
                                    </template>
                                    <template lwc:else>
                                        <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                    </template>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasCollectionContent}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={collectionContent} for:item="content">
                                            <li key={content.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center content-item">
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name={content.icon} 
                                                            size="small"
                                                            alternative-text={content.contentType}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <a href="#" class="content-item-link" data-id={content.id} onclick={handleContentLinkClick}>{content.name}</a>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse content-actions">
                                                        <lightning-button-icon 
                                                            icon-name="utility:preview" 
                                                            alternative-text="Preview"
                                                            size="small"
                                                            variant="bare"
                                                            data-id={content.id}
                                                            onclick={handlePreviewContent}>
                                                        </lightning-button-icon>
                                                        <div class="content-menu-wrapper">
                                                            <lightning-button-icon 
                                                                icon-name="utility:threedots" 
                                                                alternative-text="More actions"
                                                                size="small"
                                                                variant="bare"
                                                                data-id={content.id}
                                                                onclick={handleContentMenuToggle}>
                                                            </lightning-button-icon>
                                                            <template lwc:if={content.showMenu}>
                                                                <div class="content-dropdown-menu">
                                                                    <button class="dropdown-menu-item dropdown-menu-item-danger" data-id={content.id} onclick={handleRemoveContent}>Remove</button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="standard:file" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No content added. Add documents to this collection.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </template>
        
        <!-- Freeform Collections - Two Column Layout (same structure; empty states inside each card) -->
        <template lwc:else>
            <div class="cards-container">
                <div class="cards-layout-template">
                    
                    <!-- Left Column (1/3) - Child Collections + Members -->
                    <div class="left-column">
                        <!-- Child Collections Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:folder" 
                                        size="small"
                                        alternative-text="Child Collections">
                                    </lightning-icon>
                                    <span class="nested-card-title">Child Collections</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasChildren}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={childCollections} for:item="child">
                                            <li key={child.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center child-item" 
                                                     onclick={handleChildClick} 
                                                     data-id={child.id}
                                                     tabindex="0"
                                                     onkeydown={handleChildKeyDown}>
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name="utility:open_folder" 
                                                            size="small"
                                                            alternative-text="Collection">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <span class="slds-text-link child-name">{child.name}</span>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse">
                                                        <lightning-icon 
                                                            icon-name="utility:chevronright" 
                                                            size="x-small"
                                                            alternative-text="Navigate">
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="utility:open_folder" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No child collections. Add one to organize content.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <!-- Members/Collaborators Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:user" 
                                        size="small"
                                        alternative-text="Members">
                                    </lightning-icon>
                                    <span class="nested-card-title">Members</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasMembers}>
                                <ul class="slds-list_vertical">
                                    <template for:each={members} for:item="member">
                                        <li key={member.id} class="slds-list__item list-item">
                                            <div class="slds-media slds-media_center member-item">
                                                <div class="slds-media__figure">
                                                    <div class="member-avatar">
                                                        <lightning-icon 
                                                            icon-name="utility:user" 
                                                            size="x-small"
                                                            alternative-text={member.name}>
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                                <div class="slds-media__body">
                                                    <span class="member-name">{member.name}</span>
                                                    <span class="member-role">{member.role}</span>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="utility:user" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No members. Add collaborators to this collection.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column (2/3) - Collection Content only for freeform -->
                    <div class="right-column">
                        <!-- Collection Content Card -->
                        <div class="nested-card collection-content-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:file" 
                                        size="small"
                                        alternative-text="Collection Content">
                                    </lightning-icon>
                                    <span class="nested-card-title">Collection Content</span>
                                    <span class="content-count">{collectionContentCount}</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral" class="card-add-button"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasCollectionContent}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={collectionContent} for:item="content">
                                            <li key={content.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center content-item">
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name={content.icon} 
                                                            size="small"
                                                            alternative-text={content.contentType}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <a href="#" class="content-item-link" data-id={content.id} onclick={handleContentLinkClick}>{content.name}</a>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse content-actions">
                                                        <lightning-button-icon 
                                                            icon-name="utility:preview" 
                                                            alternative-text="Preview"
                                                            size="small"
                                                            variant="bare"
                                                            data-id={content.id}
                                                            onclick={handlePreviewContent}>
                                                        </lightning-button-icon>
                                                        <div class="content-menu-wrapper">
                                                            <lightning-button-icon 
                                                                icon-name="utility:threedots" 
                                                                alternative-text="More actions"
                                                                size="small"
                                                                variant="bare"
                                                                data-id={content.id}
                                                                onclick={handleContentMenuToggle}>
                                                            </lightning-button-icon>
                                                            <template lwc:if={content.showMenu}>
                                                                <div class="content-dropdown-menu">
                                                                    <button class="dropdown-menu-item dropdown-menu-item-danger" data-id={content.id} onclick={handleRemoveContent}>Remove</button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="card-empty-state" role="status">
                                        <lightning-icon icon-name="standard:file" size="small" class="card-empty-state-icon" alternative-text=""></lightning-icon>
                                        <p class="card-empty-state-text">No content items. Add files or documents to this collection.</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </template>
    </div>

    <!-- Preview Modal -->
    <template lwc:if={showPreviewModal}>
        <div class="preview-modal-backdrop" onclick={handleModalClick}>
            <div class="preview-modal">
                <div class="preview-modal-header">
                    <div class="preview-header-left">
                        <lightning-icon icon-name="doctype:unknown" size="small" alternative-text="Document"></lightning-icon>
                        <span class="preview-title">{previewContent.name}</span>
                    </div>
                    <div class="preview-header-right">
                        <lightning-button label="Go to Record" variant="neutral" onclick={handleGoToRecord}></lightning-button>
                        <lightning-button-icon 
                            icon-name="utility:close" 
                            alternative-text="Close"
                            size="medium"
                            variant="bare-inverse"
                            onclick={handleClosePreview}>
                        </lightning-button-icon>
                    </div>
                </div>
                <div class="preview-modal-body">
                    <div class="preview-document-placeholder">
                        <div class="preview-document-page">
                            <div class="preview-document-header">
                                <div class="preview-logo-placeholder"></div>
                                <div class="preview-header-text">
                                    <div class="preview-text-line preview-text-title"></div>
                                    <div class="preview-text-line preview-text-subtitle"></div>
                                </div>
                            </div>
                            <div class="preview-document-body">
                                <div class="preview-text-line"></div>
                                <div class="preview-text-line"></div>
                                <div class="preview-text-line preview-text-short"></div>
                                <div class="preview-spacer"></div>
                                <div class="preview-text-line"></div>
                                <div class="preview-text-line"></div>
                                <div class="preview-text-line"></div>
                                <div class="preview-text-line preview-text-medium"></div>
                                <div class="preview-spacer"></div>
                                <div class="preview-table-placeholder">
                                    <div class="preview-table-row preview-table-header">
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                    </div>
                                    <div class="preview-table-row">
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                    </div>
                                    <div class="preview-table-row">
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                        <div class="preview-table-cell"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="preview-document-footer">
                                <div class="preview-text-line preview-text-short"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</template>
