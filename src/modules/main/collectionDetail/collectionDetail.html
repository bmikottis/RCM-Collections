<template>
    <div class="collection-detail-container">
        
        <!-- Record Page Header -->
        <div class="record-header">
            <div class="record-header-top">
                <div class="record-header-icon">
                    <lightning-icon 
                        icon-name="standard:folder" 
                        size="medium"
                        alternative-text="Collection">
                    </lightning-icon>
                </div>
                <div class="record-header-info">
                    <h1 class="record-name">{collection.name}</h1>
                </div>
                <div class="record-header-actions">
                    <lightning-button 
                        label="View Details" 
                        variant="neutral" 
                        onclick={handleOpenRecord}
                        title="View full record page">
                    </lightning-button>
                </div>
            </div>
            
            <!-- Key Fields Row -->
            <div class="record-header-fields">
                <div class="header-field">
                    <span class="field-label">Status</span>
                    <span class="field-value">
                        <lightning-badge label={statusValue} variant={statusVariant}></lightning-badge>
                    </span>
                </div>
                <div class="header-field">
                    <span class="field-label">Collection Type</span>
                    <span class="field-value">{collectionKind}</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Template</span>
                    <span class="field-value">
                        <a href="#" class="template-link" onclick={handleTemplateClick}>{templateValue}</a>
                    </span>
                </div>
                <div class="header-field">
                    <span class="field-label">Region</span>
                    <span class="field-value">{regionValue}</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Created Date</span>
                    <span class="field-value placeholder-value">—</span>
                </div>
                <div class="header-field">
                    <span class="field-label">Last Modified</span>
                    <span class="field-value placeholder-value">—</span>
                </div>
            </div>
        </div>
        
        <!-- Completeness Indicator (for template-based collections) -->
        <template lwc:if={isFromTemplate}>
            <div class="completeness-section">
                <div class="completeness-ring-container">
                    <svg class="completeness-ring" viewBox="0 0 100 100">
                        <circle class="ring-background" cx="50" cy="50" r="40" />
                        <circle class="ring-progress" cx="50" cy="50" r="40" style={progressRingStyle} />
                    </svg>
                    <div class="completeness-percentage">
                        <span class="percentage-value">{completenessPercentage}%</span>
                        <span class="percentage-label">Complete</span>
                    </div>
                </div>
                <div class="completeness-details">
                    <h3 class="completeness-title">Collection Readiness</h3>
                    <p class="completeness-subtitle">{completenessLabel}</p>
                    <div class="completeness-breakdown">
                        <template lwc:if={hasTemplateChildren}>
                            <div class="breakdown-item">
                                <lightning-icon icon-name="utility:open_folder" size="x-small" alternative-text="Child Collections"></lightning-icon>
                                <span class="breakdown-label">Child Collections</span>
                                <span class="breakdown-value">{childrenSummary}</span>
                            </div>
                        </template>
                        <div class="breakdown-item">
                            <lightning-icon icon-name="utility:file" size="x-small" alternative-text="Content"></lightning-icon>
                            <span class="breakdown-label">Required Content</span>
                            <span class="breakdown-value">{contentSummary}</span>
                        </div>
                        <div class="breakdown-item">
                            <lightning-icon icon-name="utility:task" size="x-small" alternative-text="Tasks"></lightning-icon>
                            <span class="breakdown-label">Required Tasks</span>
                            <span class="breakdown-value">{taskSummary}</span>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Path/Progress Component (Read-only status indicator) - Only for non-template collections -->
        <template lwc:else>
            <div class="path-container">
                <div class="path-stages">
                    <div class="path-stage is-current">
                        <span class="stage-label">Draft</span>
                    </div>
                    <div class="path-stage is-incomplete">
                        <span class="stage-label">Review</span>
                    </div>
                    <div class="path-stage is-incomplete">
                        <span class="stage-label">Approve</span>
                    </div>
                    <div class="path-stage is-incomplete">
                        <span class="stage-label">Archive</span>
                    </div>
                </div>
            </div>
        </template>
        
        <!-- Content Cards - New Layout for Template Collections -->
        <template lwc:if={isFromTemplate}>
            <div class="cards-container">
                <div class="cards-layout-template">
                    
                    <!-- Left Column (1/3) - Child Collections + Members -->
                    <div class="left-column">
                        <!-- Child Collections Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:folder" 
                                        size="small"
                                        alternative-text="Child Collections">
                                    </lightning-icon>
                                    <span class="nested-card-title">Child Collections</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasChildren}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={childCollections} for:item="child">
                                            <li key={child.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center child-item" 
                                                     onclick={handleChildClick} 
                                                     data-id={child.id}
                                                     tabindex="0"
                                                     onkeydown={handleChildKeyDown}>
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name="utility:open_folder" 
                                                            size="small"
                                                            alternative-text="Collection">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <span class="slds-text-link child-name">{child.name}</span>
                                                        <template lwc:if={child.hasCompleteness}>
                                                            <div class="mini-progress-container">
                                                                <div class="mini-progress-bar">
                                                                    <div class="mini-progress-fill" style={child.progressStyle}></div>
                                                                </div>
                                                                <span class="mini-progress-label">{child.completenessLabel}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse">
                                                        <lightning-icon 
                                                            icon-name="utility:chevronright" 
                                                            size="x-small"
                                                            alternative-text="Navigate">
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="empty-card-state">
                                        <p class="slds-text-color_weak">No child collections</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <!-- Members/Collaborators Card -->
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:user" 
                                        size="small"
                                        alternative-text="Members">
                                    </lightning-icon>
                                    <span class="nested-card-title">Members</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <ul class="slds-list_vertical">
                                    <template for:each={members} for:item="member">
                                        <li key={member.id} class="slds-list__item list-item">
                                            <div class="slds-media slds-media_center member-item">
                                                <div class="slds-media__figure">
                                                    <div class="member-avatar">
                                                        <lightning-icon 
                                                            icon-name="utility:user" 
                                                            size="x-small"
                                                            alternative-text={member.name}>
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                                <div class="slds-media__body">
                                                    <span class="member-name">{member.name}</span>
                                                    <span class="member-role">{member.role}</span>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column (2/3) - Template Requirements with Tabs -->
                    <div class="right-column">
                        <div class="nested-card requirements-card">
                            <div class="nested-card-header requirements-header">
                                <div class="nested-card-header-left">
                                    <span class="nested-card-title">Template Requirements</span>
                                </div>
                            </div>
                            
                            <!-- Tabs -->
                            <div class="requirements-tabs">
                                <button class={contentTabClass} onclick={handleContentTabClick}>
                                    <lightning-icon icon-name="utility:file" size="x-small" alternative-text="Content"></lightning-icon>
                                    <span>Required Content</span>
                                    <span class="tab-count">{contentSummary}</span>
                                </button>
                                <button class={tasksTabClass} onclick={handleTasksTabClick}>
                                    <lightning-icon icon-name="utility:task" size="x-small" alternative-text="Tasks"></lightning-icon>
                                    <span>Required Tasks</span>
                                    <span class="tab-count">{taskSummary}</span>
                                </button>
                            </div>
                            
                            <!-- Tab Content -->
                            <div class="requirements-tab-content">
                                <!-- Content Tab -->
                                <template lwc:if={isContentTabActive}>
                                    <div class="content-checklist">
                                        <template for:each={contentChecklist} for:item="item">
                                            <div key={item.id} class={item.statusClass}>
                                                <div class="checklist-icon">
                                                    <lightning-icon 
                                                        icon-name={item.icon} 
                                                        size="x-small"
                                                        variant={item.iconVariant}
                                                        alternative-text={item.statusLabel}>
                                                    </lightning-icon>
                                                </div>
                                                <div class="checklist-content">
                                                    <span class="checklist-name">{item.name}</span>
                                                    <template lwc:if={item.isCompleted}>
                                                        <span class="checklist-file">{item.addedFileName}</span>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="checklist-description">{item.description}</span>
                                                    </template>
                                                </div>
                                                <div class="checklist-status">
                                                    <template lwc:if={item.isCompleted}>
                                                        <lightning-badge label="Added" class="status-badge-success"></lightning-badge>
                                                    </template>
                                                    <template lwc:else>
                                                        <lightning-button label="Add" variant="neutral" size="small"></lightning-button>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                        
                                        <!-- Additional Content Section -->
                                        <template lwc:if={hasAdditionalContent}>
                                            <div class="additional-content-divider">
                                                <span>Additional Content</span>
                                            </div>
                                            <template for:each={additionalContent} for:item="content">
                                                <div key={content.id} class="checklist-item is-additional">
                                                    <div class="checklist-icon">
                                                        <lightning-icon 
                                                            icon-name={content.icon} 
                                                            size="x-small"
                                                            alternative-text={content.contentType}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="checklist-content">
                                                        <span class="checklist-name">{content.name}</span>
                                                    </div>
                                                    <div class="checklist-status">
                                                        <lightning-button-icon 
                                                            icon-name="utility:preview" 
                                                            alternative-text="Preview"
                                                            size="small"
                                                            variant="bare">
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </template>
                                        </template>
                                    </div>
                                </template>
                                
                                <!-- Tasks Tab -->
                                <template lwc:if={isTasksTabActive}>
                                    <template lwc:if={hasTasks}>
                                        <div class="content-checklist">
                                            <template for:each={taskChecklist} for:item="task">
                                                <div key={task.id} class={task.statusClass}>
                                                    <div class="checklist-icon">
                                                        <lightning-icon 
                                                            icon-name={task.icon} 
                                                            size="x-small"
                                                            variant={task.iconVariant}
                                                            alternative-text={task.statusLabel}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="checklist-content">
                                                        <span class="checklist-name">{task.name}</span>
                                                        <span class="task-category">{task.category}</span>
                                                    </div>
                                                    <div class="checklist-status">
                                                        <template lwc:if={task.isCompleted}>
                                                            <lightning-badge label="Complete" class="status-badge-success"></lightning-badge>
                                                        </template>
                                                        <template lwc:else>
                                                            <lightning-button label="Mark Complete" variant="neutral" size="small"></lightning-button>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="empty-card-state">
                                            <p class="slds-text-color_weak">No required tasks for this template</p>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </template>
        
        <!-- Freeform Collections - Original 3 Column Layout -->
        <template lwc:else>
            <div class="cards-container">
                <div class="cards-grid">
                    
                    <!-- Child Collections Card -->
                    <div class="card-column">
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:folder" 
                                        size="small"
                                        alternative-text="Child Collections">
                                    </lightning-icon>
                                    <span class="nested-card-title">Child Collections</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasChildren}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={childCollections} for:item="child">
                                            <li key={child.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center child-item" 
                                                     onclick={handleChildClick} 
                                                     data-id={child.id}
                                                     tabindex="0"
                                                     onkeydown={handleChildKeyDown}>
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name="utility:open_folder" 
                                                            size="small"
                                                            alternative-text="Collection">
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <span class="slds-text-link child-name">{child.name}</span>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse">
                                                        <lightning-icon 
                                                            icon-name="utility:chevronright" 
                                                            size="x-small"
                                                            alternative-text="Navigate">
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="empty-card-state">
                                        <p class="slds-text-color_weak">No child collections</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Content Items Card -->
                    <div class="card-column">
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:file" 
                                        size="small"
                                        alternative-text="Content Items">
                                    </lightning-icon>
                                    <span class="nested-card-title">Content Items</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <template lwc:if={hasContent}>
                                    <ul class="slds-list_vertical">
                                        <template for:each={contentItems} for:item="content">
                                            <li key={content.id} class="slds-list__item list-item">
                                                <div class="slds-media slds-media_center content-item">
                                                    <div class="slds-media__figure">
                                                        <lightning-icon 
                                                            icon-name={content.icon} 
                                                            size="small"
                                                            alternative-text={content.contentType}>
                                                        </lightning-icon>
                                                    </div>
                                                    <div class="slds-media__body">
                                                        <span class="content-name">{content.name}</span>
                                                    </div>
                                                    <div class="slds-media__figure slds-media__figure_reverse">
                                                        <lightning-button-icon 
                                                            icon-name="utility:preview" 
                                                            alternative-text="Preview"
                                                            size="small"
                                                            variant="bare">
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="empty-card-state">
                                        <p class="slds-text-color_weak">No content items</p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Members/Collaborators Card -->
                    <div class="card-column">
                        <div class="nested-card">
                            <div class="nested-card-header">
                                <div class="nested-card-header-left">
                                    <lightning-icon 
                                        icon-name="standard:user" 
                                        size="small"
                                        alternative-text="Members">
                                    </lightning-icon>
                                    <span class="nested-card-title">Members</span>
                                </div>
                                <div class="nested-card-header-right">
                                    <lightning-button label="Add" variant="neutral"></lightning-button>
                                </div>
                            </div>
                            <div class="nested-card-content">
                                <ul class="slds-list_vertical">
                                    <template for:each={members} for:item="member">
                                        <li key={member.id} class="slds-list__item list-item">
                                            <div class="slds-media slds-media_center member-item">
                                                <div class="slds-media__figure">
                                                    <div class="member-avatar">
                                                        <lightning-icon 
                                                            icon-name="utility:user" 
                                                            size="x-small"
                                                            alternative-text={member.name}>
                                                        </lightning-icon>
                                                    </div>
                                                </div>
                                                <div class="slds-media__body">
                                                    <span class="member-name">{member.name}</span>
                                                    <span class="member-role">{member.role}</span>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </template>
    </div>
</template>
