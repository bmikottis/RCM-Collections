<template>
    <div class="rcm-combobox">
        <div class="rcm-combobox__label-row">
            <template lwc:if={required}>
                <span class="rcm-combobox__required" aria-hidden="true">*</span>
            </template>
            <label class="rcm-combobox__label" for={comboboxId}>{label}</label>
        </div>
        <div class="rcm-combobox__control">
            <lightning-combobox
                id={comboboxId}
                name={name}
                placeholder={placeholder}
                options={options}
                value={value}
                disabled={disabled}
                variant="label-hidden"
                onchange={handleChange}
                aria-describedby={supportingTextId}
                class="rcm-combobox__field">
            </lightning-combobox>
        </div>
        <template lwc:if={hasSupportingText}>
            <div id={supportingTextId} class="rcm-combobox__supporting" role="status">{supportingText}</div>
        </template>
    </div>
</template>
