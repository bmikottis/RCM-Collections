<template>
    <div class={itemContainerClass} role="treeitem" aria-expanded={isExpanded} aria-level={item.level}>
        
        <!-- Tree Item Row: folder click → document bridge (see collectionHierarchy RCM_TREE_* constants) -->
        <div class={itemRowClass} onclick={handleFolderRowClick} onkeydown={handleKeyDown} tabindex="0" data-collection-id={item.id}>
            
            <!-- Checkbox (collections only; content items rendered elsewhere have no checkbox) -->
            <span class="tree-item-checkbox-wrap" onclick={handleCheckboxClick}>
                <input type="checkbox" class="tree-item-checkbox" checked={itemChecked} data-id={item.id} onchange={handleCheckboxChange} aria-label="Select collection" />
            </span>
            
            <!-- Expand/Collapse Button (only for collections with children or content) -->
            <template lwc:if={canExpand}>
                <button 
                    class="slds-button slds-button_icon slds-m-right_x-small tree-toggle"
                    onclick={handleToggle}
                    aria-label={toggleAriaLabel}>
                    <lightning-icon 
                        icon-name={expandIcon} 
                        size="x-small"
                        alternative-text={toggleAriaLabel}>
                    </lightning-icon>
                </button>
            </template>
            
            <!-- Spacer for items that cannot expand -->
            <template lwc:if={cannotExpand}>
                <span class="slds-m-right_x-small tree-spacer"></span>
            </template>
            
            <!-- Collection/Content Icon -->
            <div class="icon-container">
                <template lwc:if={isFromTemplate}>
                    <img src="/public/assets/folder-shield.svg" alt="Template Collection" class="folder-shield-icon" />
                </template>
                <template lwc:else>
                    <lightning-icon 
                        icon-name={itemIcon} 
                        size="x-small"
                        class="folder-icon"
                        alternative-text={item.name}>
                    </lightning-icon>
                </template>
            </div>
            
            <!-- Item Name -->
            <span class="slds-truncate tree-item-label" title={item.name}>
                {item.name}
            </span>

            <!-- Tree Item Actions -->
            <template lwc:if={showAddButton}>
                <div class="tree-item-actions">
                    <button class="tree-add-button" onclick={handleAddButtonClick} title="Add">
                        <lightning-icon icon-name="utility:add" size="xx-small" alternative-text="Add"></lightning-icon>
                    </button>
                    <template lwc:if={showAddMenu}>
                        <div class="tree-add-menu">
                            <button class="tree-add-menu-item" onclick={handleAddChildCollection}>
                                Add Subcollection
                            </button>
                            <button class="tree-add-menu-item" onclick={handleAddContent}>
                                Add Content
                            </button>
                        </div>
                    </template>
                </div>
            </template>
            <template lwc:if={showLockedIcon}>
                <div class="tree-item-actions tree-item-locked">
                    <lightning-icon icon-name="utility:lock" size="xx-small" alternative-text="Locked" title="Collection is locked (100% complete)"></lightning-icon>
                </div>
            </template>
        </div>
        
        <!-- Expanded Content (Subcollections + Content Items) -->
        <template lwc:if={showExpanded}>
            <div class="slds-tree__group" role="group">
                
                <!-- Subcollections (Recursive) -->
                <template for:each={item.children} for:item="child">
                    <main-collection-tree-item
                        key={child.id}
                        item={child}
                        selected-id={selectedId}
                        selected-collection-ids={selectedCollectionIds}
                        expanded-ids={expandedIds}>
                    </main-collection-tree-item>
                </template>
                
                <!-- Content Items -->
                <template for:each={contentItems} for:item="content">
                    <div
                        key={content.id}
                        class="content-item-row"
                        role="treeitem"
                        tabindex="0"
                        data-id={content.id}
                        onclick={handleContentClick}
                        onkeydown={handleContentKeyDown}
                        title={content.name}>
                        <span class="slds-m-right_x-small tree-spacer"></span>
                        <lightning-icon
                            icon-name={content.icon}
                            size="x-small"
                            class="slds-m-right_small"
                            alternative-text={content.contentType}>
                        </lightning-icon>
                        <span class="slds-truncate tree-item-label content-label">
                            {content.name}
                        </span>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
