<template>
    <div class="rcm-input">
        <div class="rcm-input__label-row">
            <template lwc:if={required}>
                <span class="rcm-input__required" aria-hidden="true">*</span>
            </template>
            <label class="rcm-input__label" for={inputId}>{label}</label>
        </div>
        <div class="rcm-input__control">
            <lightning-input
                id={inputId}
                type={type}
                name={name}
                placeholder={placeholder}
                value={value}
                disabled={disabled}
                variant="label-hidden"
                onchange={handleInputChange}
                aria-describedby={supportingTextId}
                class="rcm-input__field">
            </lightning-input>
        </div>
        <template lwc:if={hasSupportingText}>
            <div id={supportingTextId} class="rcm-input__supporting" role="status">{supportingText}</div>
        </template>
    </div>
</template>
