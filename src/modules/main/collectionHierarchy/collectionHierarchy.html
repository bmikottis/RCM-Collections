<template>
    <div class="console-container">
        
        <!-- Global Header Bar -->
        <header class="global-header">
            <div class="global-header-left">
                <div class="app-logo">
                    <span class="logo-icon">M</span>
                </div>
                <span class="app-name">Makana Pharma</span>
            </div>
            <div class="global-header-center">
                <div class="global-search">
                    <lightning-icon 
                        icon-name="utility:search" 
                        size="x-small"
                        class="global-search-icon"
                        alternative-text="Search">
                    </lightning-icon>
                    <input type="text" class="global-search-input" placeholder="Search..." />
                </div>
            </div>
            <div class="global-header-right">
                <lightning-button-icon icon-name="utility:emoji" variant="bare" alternative-text="Emoji" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:favorite" variant="bare" alternative-text="Favorites" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:add" variant="bare" alternative-text="Add" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:salesforce1" variant="bare" alternative-text="Salesforce" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:help" variant="bare" alternative-text="Help" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:settings" variant="bare" alternative-text="Settings" size="medium"></lightning-button-icon>
                <lightning-button-icon icon-name="utility:notification" variant="bare" alternative-text="Notifications" size="medium"></lightning-button-icon>
<div class="user-avatar">
                    <lightning-icon icon-name="utility:user" size="x-small" alternative-text="User profile"></lightning-icon>
                </div>
            </div>
        </header>

        <!-- Console Navigation Bar -->
        <nav class="console-nav">
            <div class="console-nav-left">
                <button class="app-launcher-button" title="App Launcher">
                    <lightning-icon icon-name="utility:apps" size="x-small" alternative-text="App Launcher"></lightning-icon>
                </button>
                <span class="console-app-name">Content Management</span>
            </div>
            <div class="console-tabs">
                <template for:each={consoleTabsWithState} for:item="tab">
                    <template lwc:if={tab.closable}>
                        <div key={tab.id} class={tab.tabClass} data-tab-id={tab.id} onclick={handleConsoleTabClick}>
                            <span class="tab-label">{tab.label}</span>
                            <lightning-button-icon icon-name="utility:close" variant="bare" size="x-small" alternative-text="Close tab" data-tab-id={tab.id} onclick={handleCloseTab}></lightning-button-icon>
                        </div>
                    </template>
                    <template lwc:else>
                        <div key={tab.id} class="console-tab-wrapper">
                            <div class={tab.tabClass} data-tab-id={tab.id} onclick={handleMainTabAreaClick} role="button" tabindex="0" onkeydown={handleMainTabAreaKeyDown} title="Open menu">
                                <span class="tab-label">{tab.label}</span>
                                <div class="console-tab-chevron-wrap" aria-hidden="true">
                                    <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="Tab options"></lightning-icon>
                                </div>
                            </div>
                            <template lwc:if={showMainTabDropdown}>
                                <div class="nav-dropdown-backdrop" onclick={handleNavDropdownClose} role="presentation"></div>
                                <div class="nav-dropdown" role="menu" aria-label="Regulated Content menu">
                                    <a href="/" class="nav-dropdown-item" role="menuitem" onclick={handleCollectionsClick}>
                                        <span class="nav-dropdown-item-icon">
                                            <lightning-icon icon-name="utility:open_folder" size="x-small" alternative-text=""></lightning-icon>
                                        </span>
                                        <span class="nav-dropdown-item-label">Regulated Content Collections</span>
                                    </a>
                                    <a href={collectionTemplatesListUrl} class="nav-dropdown-item" role="menuitem" onclick={handleCollectionTemplatesClick}>
                                        <span class="nav-dropdown-item-icon">
                                            <lightning-icon icon-name="utility:file" size="x-small" alternative-text=""></lightning-icon>
                                        </span>
                                        <span class="nav-dropdown-item-label">Collection Templates</span>
                                    </a>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="collection-hierarchy-container">
        
        <!-- Tree + detail workspace (collections list or content record tab — keeps left nav) -->
        <template lwc:if={showCollectionTreeWorkspace}>
        <!-- Content Card (Tree + Preview) -->
        <div class="browser-content-card">
            
            <!-- Left: Tree Navigation + Expand/Collapse -->
            <div class={treeRailWrapperClass}>
            <aside class={treeRailClass}>
                <div class="rail-header-wrap">
                <!-- Wrapper so list view dropdown opens right below "All Collections" row only -->
                <div class="rail-header-top-wrap">
                    <div class="rail-header-top">
                        <div class="rail-header-left">
                            <lightning-icon icon-name="standard:folder" size="medium" class="rail-header-icon" alternative-text="Collections"></lightning-icon>
                            <button type="button" class="rail-list-view-trigger" onclick={handleRailListViewToggle} aria-haspopup="true" aria-expanded={showListViewsDropdown} aria-label="Select list view">
                                <span class="rail-list-view-name">{currentListViewName}</span>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="rail-chevron" alternative-text=""></lightning-icon>
                            </button>
                        </div>
                        <div class="rail-header-actions-wrap">
                            <div class="rail-header-actions">
                                <button type="button" class="icon-button" onclick={handleRailPin} title="Pin list view" aria-label="Pin list view">
                                    <lightning-icon icon-name="utility:pin" size="x-small" alternative-text=""></lightning-icon>
                                </button>
                                <button type="button" class="icon-button rail-menu-trigger" onclick={handleRailMenuToggle} aria-haspopup="true" aria-expanded={showRailMenuDropdown} title="List view options" aria-label="List view menu">
                                    <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text=""></lightning-icon>
                                </button>
                            </div>
                            <!-- Rail menu dropdown (opens directly below pin + menu icons) -->
                            <template lwc:if={showRailMenuDropdown}>
                                <div class="rail-dropdown-backdrop" onclick={handleRailMenuBackdrop} role="presentation"></div>
                                <div class="rail-menu-dropdown" role="menu" aria-label="List view options">
                                    <a href="#" class="rail-menu-item" role="menuitem" onclick={handleRailMenuNew}>New</a>
                                    <a href="#" class="rail-menu-item" role="menuitem" onclick={handleRailMenuPrintable}>Printable View</a>
                                    <a href="#" class="rail-menu-item" role="menuitem" onclick={handleRailMenuAssignLabel}>Assign Label</a>
                                </div>
                            </template>
                        </div>
                    </div>
                    <!-- List view selector dropdown (opens directly below this row) -->
                    <template lwc:if={showListViewsDropdown}>
                        <div class="rail-dropdown-backdrop" onclick={handleRailListViewsBackdrop} role="presentation"></div>
                        <div class="rail-list-views-dropdown" role="dialog" aria-label="List views">
                            <div class="rail-list-views-search-wrap">
                                <lightning-icon icon-name="utility:search" size="x-small" class="rail-list-views-search-icon" alternative-text=""></lightning-icon>
                                <input type="search" class="rail-list-views-search" placeholder="Search lists..." oninput={handleListViewsSearchInput} aria-label="Search list views" />
                            </div>
                            <div class="rail-list-views-heading">List Views</div>
                            <ul class="rail-list-views-list" role="listbox">
                                <template for:each={railFilteredListViews} for:item="view">
                                    <li key={view.id} class="rail-list-views-item" data-id={view.id} onclick={handleSelectListView} role="option" aria-selected={view.isSelected}>
                                        <template lwc:if={view.isSelected}>
                                            <lightning-icon icon-name="utility:check" size="x-small" class="rail-list-views-check" alternative-text="Selected"></lightning-icon>
                                        </template>
                                        <template lwc:else>
                                            <span class="rail-list-views-check-placeholder"></span>
                                        </template>
                                        <span class="rail-list-views-item-label">{view.name}</span>
                                        <template lwc:if={view.pinned}>
                                            <span class="rail-list-views-pinned">(Pinned list)</span>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>
                <div class="rail-header">
                    <!-- Row 2: Metadata + display options, refresh, filter -->
                    <div class="rail-header-bottom">
                        <div class="rail-meta">{railCollectionCount} items · {railUpdatedText}</div>
                        <div class="rail-secondary-actions">
                            <button type="button" class="rail-icon-action" title="Display options" aria-label="Display options">
                                <lightning-icon icon-name="utility:table" size="x-small" alternative-text=""></lightning-icon>
                                <lightning-icon icon-name="utility:chevrondown" size="xx-small" class="rail-action-chevron" alternative-text=""></lightning-icon>
                            </button>
                            <button type="button" class="rail-icon-action" onclick={handleRailRefresh} title="Refresh" aria-label="Refresh">
                                <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text=""></lightning-icon>
                            </button>
                            <button type="button" class={railFilterButtonClass} onclick={handleFilterToggle} title="Filter" aria-label="Filter">
                                <lightning-icon icon-name="utility:filterList" size="x-small" alternative-text=""></lightning-icon>
                            </button>
                        </div>
                    </div>
                    <!-- Search bar inside grey header -->
                    <div class="rail-search-row">
                        <lightning-icon icon-name="utility:search" size="x-small" class="rail-search-icon" alternative-text=""></lightning-icon>
                        <input type="search" class="rail-search-input" placeholder="Search this list..." value={searchTerm} oninput={handleSearchChange} aria-label="Search this list" />
                    </div>
                </div>
                </div>
                <!-- End rail-header-wrap -->

                <!-- Filter Panel (shown when filter is active) -->
                <template lwc:if={showFilter}>
                    <div class="filter-panel">
                        <div class="filter-section">
                            <span class="filter-label">Collection Template</span>
                            <lightning-checkbox-group
                                name="typeFilter"
                                options={collectionTypeOptions}
                                value={selectedTypeFilters}
                                onchange={handleTypeFilterChange}>
                            </lightning-checkbox-group>
                        </div>
                        <div class="filter-section">
                            <span class="filter-label">Status</span>
                            <lightning-checkbox-group
                                name="statusFilter"
                                options={statusOptions}
                                value={selectedStatusFilters}
                                onchange={handleStatusFilterChange}>
                            </lightning-checkbox-group>
                        </div>
                        <div class="filter-section">
                            <span class="filter-label">Ownership</span>
                            <lightning-checkbox-group
                                name="ownershipFilter"
                                options={ownershipOptions}
                                value={selectedOwnershipFilters}
                                onchange={handleOwnershipFilterChange}>
                            </lightning-checkbox-group>
                        </div>
                        <div class="filter-section">
                            <span class="filter-label">Contains Content Types</span>
                            <div class="search-lookup">
                                <div class="search-lookup-input-container">
                                    <input 
                                        type="text"
                                        class="search-lookup-input"
                                        placeholder="Search content types..."
                                        value={contentTypeSearchTerm}
                                        onfocus={handleContentTypeSearchFocus}
                                        onblur={handleContentTypeSearchBlur}
                                        oninput={handleContentTypeSearchInput}
                                    />
                                    <lightning-icon 
                                        icon-name="utility:search" 
                                        size="x-small"
                                        class="search-lookup-icon"
                                        alternative-text="Search">
                                    </lightning-icon>
                                </div>
                                <template lwc:if={showContentTypeDropdown}>
                                    <div class="search-lookup-dropdown">
                                        <template lwc:if={hasFilteredContentTypes}>
                                            <ul class="search-lookup-list" role="listbox">
                                                <template for:each={filteredContentTypeOptions} for:item="option">
                                                    <li 
                                                        key={option.value} 
                                                        class="search-lookup-option"
                                                        role="option"
                                                        onmousedown={handleContentTypeOptionClick}
                                                        data-value={option.value}>
                                                        {option.label}
                                                    </li>
                                                </template>
                                            </ul>
                                        </template>
                                        <template lwc:else>
                                            <div class="search-lookup-empty">No matching content types</div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <template lwc:if={hasSelectedContentTypes}>
                                <div class="selected-pills">
                                    <template for:each={selectedContentTypePills} for:item="pill">
                                        <span key={pill.value} class="filter-pill">
                                            <span class="pill-label">{pill.label}</span>
                                            <button 
                                                class="pill-remove" 
                                                onclick={handleRemoveContentType}
                                                data-value={pill.value}
                                                aria-label={pill.removeLabel}>
                                                <lightning-icon 
                                                    icon-name="utility:close" 
                                                    size="xx-small"
                                                    alternative-text="Remove">
                                                </lightning-icon>
                                            </button>
                                        </span>
                                    </template>
                                    <template lwc:if={hasMoreContentTypes}>
                                        <span class="pills-more">+{moreContentTypesCount} more</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <div class="filter-actions">
                            <lightning-button 
                                label="Clear" 
                                variant="neutral" 
                                onclick={handleClearFilters}>
                            </lightning-button>
                            <lightning-button 
                                label="Apply" 
                                variant="neutral" 
                                onclick={handleApplyFilters}>
                            </lightning-button>
                        </div>
                    </div>
                </template>
                
                <!-- Tree Content (hidden when filter panel is shown) -->
                <template lwc:if={showTreeContent}>
                    <div class="tree-nav-content" role="tree" aria-label="Collection hierarchy">
                        <template for:each={rootCollections} for:item="collection">
                            <main-collection-tree-item
                                key={collection.id}
                                item={collection}
                                selected-id={selectedCollectionId}
                                selected-collection-ids={selectedCollectionIds}
                                expanded-ids={expandedIdsArray}
                                oncollectioncheck={handleCollectionCheck}>
                            </main-collection-tree-item>
                        </template>
                    </div>
                </template>
            </aside>
            <button type="button" class="rail-collapse-toggle" onclick={handleRailCollapseToggle} aria-label={railCollapseAriaLabel} title={railCollapseTitle}>
                <lightning-icon icon-name={railCollapseIcon} size="x-small" alternative-text="" class="rail-collapse-icon"></lightning-icon>
            </button>
            </div>
            
            <!-- Right: Collection Preview -->
            <main class="detail-main">
                <!-- Breadcrumb Navigation -->
                <template lwc:if={hasBreadcrumbs}>
                    <nav class="breadcrumb-bar" aria-label="Breadcrumb">
                        <div class="breadcrumb-list">
                            <template for:each={breadcrumbs} for:item="crumb">
                                <span key={crumb.id} class="breadcrumb-item">
                                    <template lwc:if={crumb.isLast}>
                                        <template lwc:if={showContentRecordPage}>
                                            <button type="button" class="breadcrumb-link" onclick={handleBreadcrumbClick} data-id={crumb.id}>{crumb.name}</button>
                                        </template>
                                        <template lwc:else>
                                            <span class="breadcrumb-current">{crumb.name}</span>
                                        </template>
                                    </template>
                                    <template lwc:else>
                                        <button type="button" class="breadcrumb-link" onclick={handleBreadcrumbClick} data-id={crumb.id}>{crumb.name}</button>
                                        <span class="breadcrumb-separator">›</span>
                                    </template>
                                </span>
                            </template>
                        </div>
                    </nav>
                </template>
                
                <template lwc:if={showContentRecordPage}>
                    <div class="detail-content-record-wrap">
                        <main-content-record-page
                            content={activeContentRecordData}
                            parent-collection-name={activeContentRecordParentName}
                            parent-collection-id={activeContentRecordParentId}>
                        </main-content-record-page>
                    </div>
                </template>
                <template lwc:elseif={hasSelectedCollection}>
                    <main-collection-detail
                        collection={selectedCollection}
                        collection-type={selectedCollectionType}
                        completeness-data={selectedCollectionCompleteness}
                        onfindrequiredcontent={handleFindRequiredContent}
                        onfindrequiredcontent_tryagain={handleFindRequiredContentTryAgain}
                        oncollectionclick={handleCollectionDetailClick}
                        onviewdetails={handleViewDetails}
                        onopencontentrecord={handleOpenContentRecord}>
                    </main-collection-detail>
                </template>
                <template lwc:else>
                    <!-- Empty State -->
                    <div class="empty-state">
                        <lightning-icon 
                            icon-name="utility:touch_action" 
                            size="large"
                            class="empty-state-icon">
                        </lightning-icon>
                        <h3 class="slds-text-heading_medium slds-m-top_medium slds-m-bottom_small">
                            Select a Collection
                        </h3>
                        <p class="slds-text-body_regular slds-text-color_weak">
                            Choose a collection from the tree to view its details, content, and subcollections.
                        </p>
                    </div>
                </template>
            </main>
        </div>
        </template>

        <!-- Templates List View (full width, no left nav) -->
        <template lwc:if={showTemplatesListView}>
            <div class="list-view-body">
                <main class="list-view-main">
                    <!-- Two-row grey page header (Salesforce list view style) -->
                    <header class="list-view-header">
                        <div class="list-view-header-top">
                            <div class="list-view-header-left">
                                <lightning-icon icon-name="standard:document" size="medium" class="list-view-header-icon" alternative-text=""></lightning-icon>
                                <div class="list-view-header-title-block">
                                    <span class="list-view-header-context">Collection Templates</span>
                                    <div class="list-view-header-title-wrap">
                                        <h1 class="list-view-header-title">Regulated Collection Templates</h1>
                                        <lightning-icon icon-name="utility:chevrondown" size="x-small" class="list-view-header-chevron" alternative-text="View options"></lightning-icon>
                                    </div>
                                </div>
                            </div>
                            <div class="list-view-header-right">
                                <lightning-button label="New" variant="brand" icon-name="utility:add" title="New template"></lightning-button>
                            </div>
                        </div>
                        <div class="list-view-header-bottom">
                            <div class="list-view-header-meta">{templatesListMetadata}</div>
                            <div class="list-view-header-actions">
                                <div class="list-view-header-search-wrap">
                                    <lightning-icon icon-name="utility:search" size="x-small" class="list-view-header-search-icon" alternative-text=""></lightning-icon>
                                    <input type="search" class="list-view-header-search" placeholder="Search..." oninput={handleTemplatesListSearchInput} aria-label="Search this list" />
                                </div>
                                <lightning-button-icon icon-name="utility:settings" variant="bare" alternative-text="List settings" size="small"></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:table" variant="bare" alternative-text="View options" size="small"></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:edit" variant="bare" alternative-text="Edit list" size="small"></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:refresh" variant="bare" alternative-text="Refresh" size="small"></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:filterList" variant="bare" alternative-text="Filters" size="small"></lightning-button-icon>
                            </div>
                        </div>
                    </header>
                    <!-- Data table with checkbox column -->
                    <div class="list-view-table-card">
                        <div class="list-view-table-wrap">
                            <template lwc:if={hasTemplatesForList}>
                                <table class="list-view-table" role="grid" aria-label="Regulated Collection Templates">
                                    <thead>
                                        <tr class="list-view-thead-tr">
                                            <th scope="col" class="list-view-th list-view-th-checkbox" role="columnheader">
                                                <input type="checkbox" class="list-view-checkbox" data-select="all" onchange={handleTemplatesSelectAll} checked={isAllTemplatesSelected} aria-label="Select all rows" />
                                            </th>
                                            <th scope="col" class="list-view-th list-view-th-name" role="columnheader">Template Name</th>
                                            <th scope="col" class="list-view-th list-view-th-desc" role="columnheader">Description</th>
                                            <th scope="col" class="list-view-th list-view-th-right list-view-th-editable" role="columnheader">Structure Editable</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={filteredTemplatesForList} for:item="row">
                                            <tr key={row.id} class="list-view-row" data-id={row.id} onclick={handleTemplatesListRowClick} role="row">
                                                <td class="list-view-td-checkbox" data-label="Select" onclick={handleTemplatesRowCheckboxClick}>
                                                    <input type="checkbox" class="list-view-checkbox" data-id={row.id} checked={row.checked} onchange={handleTemplatesRowSelect} aria-label="Select row" />
                                                </td>
                                                <td class="list-view-td-name" data-label="Template Name"><a href="#" class="list-view-link" data-id={row.id} onclick={handleTemplatesListLinkClick}>{row.name}</a></td>
                                                <td class="list-view-td-desc" data-label="Description">{row.description}</td>
                                                <td class="list-view-td-right" data-label="Structure Editable">{row.structureModifiable}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template lwc:else>
                                <div class="list-view-empty" role="status">
                                    <lightning-icon icon-name="utility:file" size="large" class="list-view-empty-icon" alternative-text=""></lightning-icon>
                                    <p class="list-view-empty-text">No templates to display.</p>
                                    <p class="list-view-empty-hint">Try a different search.</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </main>
            </div>
        </template>

        <!-- Collection Record Page View -->
        <template lwc:if={showRecordPage}>
            <div class="record-page-wrapper">
                <main-collection-record-page
                    collection={activeRecordCollection}
                    collection-type={activeRecordCollectionType}
                    onopencontentrecord={handleOpenContentRecord}>
                </main-collection-record-page>
            </div>
        </template>

        </div>
    </div>

    <!-- Create New Collection Modal -->
    <template lwc:if={showCreateModal}>
        <section class="create-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="create-modal-title" onclick={handleCreateBackdropClick}>
            <div class="create-modal" onclick={handleCreateModalClick}>
                <header class="create-modal-header">
                    <h2 id="create-modal-title" class="create-modal-title">New Collection</h2>
                    <lightning-button-icon icon-name="utility:close" variant="bare" alternative-text="Close" onclick={handleCloseCreateModal} class="create-modal-close"></lightning-button-icon>
                </header>
                <div class="create-modal-body">
                    <template lwc:if={createStepOne}>
                        <div class="create-step1">
                            <p class="create-modal-hint">Choose a template or create from scratch.</p>
                            <div class="create-search-row">
                                <div class="create-search-wrap">
                                    <lightning-icon icon-name="utility:search" size="x-small" class="create-search-icon" alternative-text="Search"></lightning-icon>
                                    <input type="text" class="create-search-input" placeholder="Search templates..." value={createSearchTerm} oninput={handleCreateSearchChange} aria-label="Search templates" />
                                </div>
                            </div>
                            <template lwc:if={createFromScratchMatchesSearch}>
                                <div class="create-section">
                                    <button type="button" class="create-card create-card-from-scratch" onclick={handleSelectFromScratch}>
                                        <lightning-icon icon-name="utility:add" size="medium" class="create-card-icon" alternative-text=""></lightning-icon>
                                        <div class="create-card-content">
                                            <span class="create-card-name">Create from Scratch</span>
                                            <span class="create-card-desc">Start with an empty collection. Add content and structure as needed.</span>
                                        </div>
                                    </button>
                                </div>
                            </template>
                            <div class="create-section">
                                <h3 class="create-section-title">Templates ({filteredTemplates.length})</h3>
                                <div class="create-cards-grid">
                                    <template for:each={filteredTemplates} for:item="tpl">
                                        <button key={tpl.id} type="button" class="create-card" data-type-id={tpl.id} onclick={handleSelectTemplate}>
                                            <lightning-icon icon-name={tpl.icon} size="medium" class="create-card-icon" alternative-text=""></lightning-icon>
                                            <div class="create-card-content">
                                                <div class="create-card-name-row">
                                                    <span class="create-card-name">{tpl.name}</span>
                                                    <template lwc:if={tpl.isRigidStructure}>
                                                        <span class="create-card-structure-badge" title="This template has a fixed, required structure that cannot be modified.">
                                                            <lightning-icon icon-name="utility:lock" size="xx-small" class="create-card-lock-icon" alternative-text=""></lightning-icon>
                                                            <span class="create-card-structure-label">Required structure</span>
                                                        </span>
                                                    </template>
                                                </div>
                                                <span class="create-card-desc">{tpl.descriptionShort}</span>
                                            </div>
                                        </button>
                                    </template>
                                </div>
                                <template lwc:if={filteredTemplates.length}></template>
                                <template lwc:else>
                                    <p class="create-no-results slds-text-color_weak">No templates match your search.</p>
                                </template>
                            </div>
                        </div>
                    </template>
                    <template lwc:if={createStepTwo}>
                        <div class="create-step2">
                            <p class="create-modal-hint">Enter details for the new collection.</p>
                            <div class="create-form slds-form">
                                <div class="create-form-grid">
                                    <div class="slds-form-element slds-size_1-of-2">
                                        <label class="slds-form-element__label" for="create-name">Collection Name<span class="required-asterisk" aria-hidden="true">*</span></label>
                                        <div class="slds-form-element__control">
                                            <lightning-input id="create-name" type="text" label="" placeholder={createNamePlaceholder} required data-field="name" value={createForm.name} onchange={handleCreateFormChange} variant="label-hidden"></lightning-input>
                                            <template lwc:if={createNameHelpText}>
                                                <span id="create-name-helptext" class="slds-form-element__help" role="status">{createNameHelpText}</span>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="slds-form-element slds-size_1-of-2">
                                        <label class="slds-form-element__label">Template</label>
                                        <div class="slds-form-element__control create-form-readonly">
                                            <span class="slds-form-element__static">{selectedTemplateName}</span>
                                        </div>
                                    </div>
                                    <div class="slds-form-element slds-size_1-of-2">
                                        <label class="slds-form-element__label" for="create-status">Status</label>
                                        <div class="slds-form-element__control">
                                            <lightning-combobox name="status" label="" options={statusOptionsForCreate} value={createForm.status} onchange={handleCreateFormChange} data-field="status" variant="label-hidden"></lightning-combobox>
                                        </div>
                                    </div>
                                    <div class="slds-form-element slds-size_1-of-2">
                                        <label class="slds-form-element__label" for="create-region">Region</label>
                                        <div class="slds-form-element__control">
                                            <lightning-combobox name="region" label="" options={regionOptionsForCreate} value={createForm.region} onchange={handleCreateFormChange} data-field="region" variant="label-hidden"></lightning-combobox>
                                        </div>
                                    </div>
                                    <div class="slds-form-element slds-size_1-of-1">
                                        <label class="slds-form-element__label" for="create-description">Description</label>
                                        <div class="slds-form-element__control">
                                            <lightning-textarea name="description" label="" placeholder="Enter a description of the collection" data-field="description" value={createForm.description} onchange={handleCreateFormChange} variant="label-hidden" max-length="500"></lightning-textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <footer class="create-modal-footer">
                    <template lwc:if={createStepTwo}>
                        <lightning-button label="Back" variant="neutral" onclick={handleCreateBack} class="create-footer-back"></lightning-button>
                    </template>
                    <div class="create-footer-actions">
                        <lightning-button label="Cancel" variant="neutral" onclick={handleCloseCreateModal} class="create-footer-cancel"></lightning-button>
                        <template lwc:if={createStepTwo}>
                            <lightning-button label="Save" variant="neutral" onclick={handleCreateSave} disabled={createFormNameEmpty}></lightning-button>
                        </template>
                    </div>
                </footer>
            </div>
        </section>
    </template>
</template>
